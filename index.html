<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch Engine</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.95)),
url('https://images.unsplash.com/photo-1501386761578-eac5c94b800a') center/cover;
}

h1{font-size:50px}

.btn{
display:block;
width:90%;
max-width:400px;
margin:10px auto;
padding:15px;
background:red;
border:none;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.card{
background:#111;
margin:20px;
padding:15px;
border-radius:10px;
}

.task{
background:#222;
padding:10px;
margin:8px;
border-radius:8px;
}

/* FLOAT CTA */
.float{
position:fixed;
bottom:20px;
left:20px;
background:red;
padding:12px;
border-radius:20px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* LIVE FEED */
.feed{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:10px;
border-radius:10px;
font-size:12px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>WHY SO SERIOUS?</h1>
<p>Serious Finch Traffic Engine</p>

<button class="btn" onclick="goSpotify()">Spotify</button>
<button class="btn" onclick="goTidal()">TIDAL</button>
<button class="btn" onclick="goSound()">SoundCloud</button>
</div>

<!-- MUSIC -->
<div class="card">
<h2>Featured Track</h2>
<iframe src="https://open.spotify.com/embed/track/5YEBWTiJxIsqNA15LIKk4B"
width="100%" height="300"></iframe>
</div>

<!-- THINK TANK -->
<div class="card" id="think">
<h2>Think Tank</h2>
<div id="tasks"></div>
<button class="btn" onclick="generate()">New Strategy</button>
</div>

<!-- VIRAL CAPTION ENGINE -->
<div class="card">
<h2>Viral Caption</h2>
<p id="caption">Tap in now</p>
<button class="btn" onclick="captionGen()">Generate Caption</button>
</div>

<!-- STATS -->
<div class="card">
<h2>Stats</h2>
<p id="clicks">Clicks: 0</p>
<p id="actions">Actions: 0</p>
</div>

<!-- LIVE ACTIVITY -->
<div class="feed" id="feed">Someone just tapped in</div>

<script>
let clicks=0;
let actions=0;

function goSpotify(){
clicks++;update();
window.open("https://open.spotify.com/track/5YEBWTiJxIsqNA15LIKk4B");
}

function goTidal(){
clicks++;update();
window.open("https://tidal.com/track/249962630/u");
}

function goSound(){
clicks++;update();
window.open("https://on.soundcloud.com/KGizTKf05XbbIIH5VD");
}

function update(){
document.getElementById("clicks").innerText="Clicks: "+clicks;
}

/* THINK TANK */
function generate(){
actions++;
document.getElementById("actions").innerText="Actions: "+actions;

const moves=[
"Post in 5 Facebook groups",
"Drop 3 TikToks today",
"Comment on 20 hip-hop posts",
"Send link to 10 people",
"Post IG story + link",
"Share in Discord servers",
"Drop late night post",
"Reply to every comment",
"Find trending sound and remix it",
"Post snippet with hook"
];

let html="";
moves.sort(()=>0.5-Math.random()).slice(0,5).forEach(m=>{
html+=`<div class="task">${m}</div>`;
});

document.getElementById("tasks").innerHTML=html;
}
generate();

/* CAPTION ENGINE */
function captionGen(){
const caps=[
"they not ready for this… tap in now 🔥",
"real music still exists… press play 🎧",
"if you see this you early 🚀",
"this one different… no skips",
"run this up if you hear it 💯"
];

document.getElementById("caption").innerText=
caps[Math.floor(Math.random()*caps.length)];
}

/* LIVE FEED */
const activity=[
"Someone from NY tapped in",
"New listener just pressed play",
"Track just got replayed",
"Someone shared your link",
"New visitor on your page"
];

setInterval(()=>{
document.getElementById("feed").innerText=
activity[Math.floor(Math.random()*activity.length)];
},3000);

/* FLOAT BUTTON */
const box=document.createElement("div");
box.className="float";
box.innerHTML="TAP IN";
box.onclick=goSpotify;
document.body.appendChild(box);
</script>

</body>
</html>
