<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch Empire</title>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0;text-align:center}
h1{margin-top:40px}
button{margin:5px;padding:12px 20px;border-radius:25px;border:none;cursor:pointer}
.primary{background:#ff2d55;color:#fff}
.secondary{background:#111;color:#fff;border:1px solid #333}
.gold{background:#d4af37;color:#000}
.section{padding:40px}
iframe{border-radius:12px}
#promo{margin:15px;color:#ff2d55}
#stats{margin-top:20px;color:#aaa}
</style>
</head>

<body>

<h1>GOD MODE EMPIRE</h1>

<!-- BUTTONS -->
<button class="primary" data-go="youtube">▶ PLAY</button>
<button class="secondary" data-go="spotify">Spotify</button>
<button class="secondary" data-go="apple">Apple</button>
<button class="gold" data-go="tidal">TIDAL</button>
<button class="secondary" data-go="instagram">Instagram</button>
<button class="secondary" data-go="facebook">Facebook</button>
<button class="secondary" data-go="hub">Hub</button>

<div id="liveCounter">🔥 153 tapped in</div>

<!-- PLAYER -->
<div class="section">

<!-- YouTube -->
<iframe width="100%" height="300"
src="https://www.youtube.com/embed/L6qnsBgi2ZQ?autoplay=1&mute=1"></iframe>

<br><br>

<!-- Spotify -->
<iframe src="https://open.spotify.com/embed/track/7zEJAr3odmPEhBiywgqafV"
width="100%" height="152"></iframe>

<br><br>

<!-- Apple -->
<iframe src="https://embed.music.apple.com/us/song/no-contact-feat-serious-finch/1854184106"
width="100%" height="175"></iframe>

<br><br>

<!-- YouTube Music -->
<iframe width="100%" height="300"
src="https://www.youtube.com/embed/videoseries?list=OLAK5uy_lceL2Dg6t59lhNr_QI6BQwKUWVhOrl_L0"></iframe>

<br><br>

<iframe width="100%" height="300"
src="https://www.youtube.com/embed/videoseries?list=OLAK5uy_lb3VeA7H-WUpMjWzHJno35vdQkddcQRbs"></iframe>

</div>

<!-- TRAFFIC ENGINE -->
<div class="section">
<h2>Traffic Engine</h2>
<div id="promo"></div>
<div id="stats"></div>
</div>

<script>
/* =========================
   🔥 GOD MODE TRAFFIC ENGINE
========================= */

// 🎯 LINKS (CONTROL CENTER)
const LINKS = {
spotify:"https://open.spotify.com/track/7zEJAr3odmPEhBiywgqafV",
apple:"https://music.apple.com/us/song/no-contact-feat-serious-finch/1854184106",
tidal:"https://tidal.com/artist/19525593",
youtube:"https://youtube.com/watch?v=L6qnsBgi2ZQ",
instagram:"https://www.instagram.com/serious_finch?igsh=MWFmdG42anI0d2ttcQ==",
facebook:"https://www.facebook.com/share/1L3xM3P1y7/",
hub:"https://serious-finch-hub.replit.app/"
};

// 📊 TRACKING
function trackClick(platform){
let stats=JSON.parse(localStorage.getItem("sf_stats")||"{}");
stats[platform]=(stats[platform]||0)+1;
localStorage.setItem("sf_stats",JSON.stringify(stats));
updateStats();
console.log("CLICK:",platform);
}

// 🔗 ADD UTM TRACKING
function buildLink(url,platform){
let u=new URL(url);
u.searchParams.set("utm_source","empire");
u.searchParams.set("utm_campaign","serious_finch");
u.searchParams.set("utm_content",platform);
return u.toString();
}

// 🚀 ROUTER
function go(platform){
let link=LINKS[platform];
if(!link)return;

let finalLink=buildLink(link,platform);
trackClick(platform);

window.open(finalLink,"_blank");
}

// 🔘 BUTTON CONNECTION
document.querySelectorAll("[data-go]").forEach(btn=>{
btn.onclick=()=>go(btn.getAttribute("data-go"));
});

// 🔁 PROMO ROTATION
const PROMOS=[
"🔥 Tap into the YouTube rollout",
"🎧 Run it up on Spotify",
"🍎 Apple Music listeners tap in",
"💎 TIDAL premium sound",
"📲 Follow Serious Finch on Instagram",
"📘 Share on Facebook"
];

let i=0;
setInterval(()=>{
document.getElementById("promo").innerText=PROMOS[i];
i=(i+1)%PROMOS.length;
},3000);

// 📊 SHOW STATS
function updateStats(){
let stats=JSON.parse(localStorage.getItem("sf_stats")||"{}");
let html="<strong>Traffic Stats</strong><br>";
for(let k in stats){
html+=k+": "+stats[k]+"<br>";
}
document.getElementById("stats").innerHTML=html;
}
updateStats();

// 🔥 LIVE COUNTER
let count=153;
setInterval(()=>{
count+=Math.random()>0.5?1:0;
document.getElementById("liveCounter").innerText="🔥 "+count+" tapped in";
},4000);

// 🔒 LIGHT PROTECTION
document.addEventListener("contextmenu",e=>e.preventDefault());
document.onkeydown=function(e){
if(e.ctrlKey&&(e.key==='u'||e.key==='s'))return false;
};

</script>

</body>
</html>
