<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serious Finch x Sons of Gunsmoke</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow-x:hidden;
}

/* 🔥 HERO SLIDER */
.hero{
position:relative;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:opacity 1.2s ease;
}

.hero-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:3rem;
letter-spacing:3px;
}

/* BUTTONS */
.btn{
padding:12px 22px;
margin:6px;
border-radius:30px;
border:none;
cursor:pointer;
font-weight:bold;
}

.primary{background:#ff2d55;color:#fff}
.secondary{background:#111;color:#fff;border:1px solid #333}
.gold{background:#d4af37;color:#000}

/* SECTION */
.section{
padding:40px 20px;
text-align:center;
}

iframe{
width:100%;
max-width:500px;
height:250px;
border:none;
margin-top:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.grid img{
width:100%;
border-radius:12px;
}

/* LIVE FEEL */
#live{
text-align:center;
color:#ff2d55;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<div id="slide1" class="hero-slide" style="background-image:url('image-hero-1.jpg');opacity:1;"></div>
<div id="slide2" class="hero-slide" style="background-image:url('image-hero-2.jpg');opacity:0;"></div>
<div id="slide3" class="hero-slide" style="background-image:url('image-hero-3.jpg');opacity:0;"></div>

<div class="hero-overlay"></div>

<div class="hero-content">
<h1>SERIOUS FINCH</h1>
<p>Sons of Gunsmoke</p>

<button class="btn primary" onclick="go('youtube')">▶ PLAY</button>
<button class="btn secondary" onclick="go('spotify')">Spotify</button>
<button class="btn gold" onclick="go('tidal')">TIDAL</button>
</div>

</div>

<div id="live">🔥 147 tapped in</div>

<!-- VIDEO -->
<div class="section">
<h2>Latest Video</h2>
<iframe src="https://www.youtube.com/embed/L6qnsBgi2ZQ"></iframe>
</div>

<!-- STREAM -->
<div class="section">
<h2>Stream</h2>

<iframe src="https://open.spotify.com/embed/track/7zEJAr3odmPEhBiywgqafV"></iframe>

<iframe src="https://embed.music.apple.com/us/song/no-contact-feat-serious-finch/1854184106"></iframe>

</div>

<!-- VISUALS -->
<div class="section">
<h2>Visuals</h2>

<div class="grid">
<img src="image-hero-1.jpg">
<img src="image-hero-2.jpg">
<img src="image-hero-3.jpg">
</div>

</div>

<!-- SOCIAL -->
<div class="section">
<h2>Follow</h2>

<button class="btn secondary" onclick="go('instagram')">Instagram</button>
<button class="btn secondary" onclick="go('facebook')">Facebook</button>

</div>

<script>

/* 🔥 REAL LINK SYSTEM */
const LINKS={
spotify:"https://open.spotify.com/track/7zEJAr3odmPEhBiywgqafV",
apple:"https://music.apple.com/us/song/no-contact-feat-serious-finch/1854184106",
tidal:"https://tidal.com/artist/19525593",
youtube:"https://youtube.com/watch?v=L6qnsBgi2ZQ",
instagram:"https://www.instagram.com/serious_finch",
facebook:"https://www.facebook.com/share/1L3xM3P1y7/"
};

function go(p){
let u=new URL(LINKS[p]);
u.searchParams.set("utm_source","finchhub");
u.searchParams.set("utm_campaign","rollout");
window.open(u,"_blank");
}

/* 🔥 HERO SLIDER */
let slides=["slide1","slide2","slide3"];
let index=0;

setInterval(()=>{
document.getElementById(slides[index]).style.opacity=0;
index=(index+1)%3;
document.getElementById(slides[index]).style.opacity=1;
},4000);

/* 🔥 LIVE COUNTER */
let c=147;
setInterval(()=>{
c+=Math.random()>0.5?1:0;
document.getElementById("live").innerText="🔥 "+c+" tapped in";
},4000);

</script>

</body>
</html>
