<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sons of Gunsmoke: Neon Warfare</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#00e5ff">

<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
canvas{display:block}
#hud,#msg{position:fixed;background:rgba(0,0,0,.6);padding:10px;border-radius:10px;z-index:10}
#hud{top:10px;left:10px}
#msg{top:10px;left:50%;transform:translateX(-50%)}

#crosshair{position:fixed;left:50%;top:50%;width:20px;height:20px;transform:translate(-50%,-50%)}
#crosshair:before,#crosshair:after{content:"";position:absolute;background:#fff}
#crosshair:before{width:2px;height:20px;left:9px}
#crosshair:after{width:20px;height:2px;top:9px}

#joyBase{position:fixed;left:20px;bottom:20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1)}
#joyStick{position:absolute;width:50px;height:50px;border-radius:50%;background:#fff;left:35px;top:35px}

.btn{position:fixed;border-radius:50%;padding:18px;font-weight:bold}
#shoot{right:20px;bottom:20px;background:red}
#act{right:100px;bottom:20px;background:yellow;color:#000}
#reload{right:20px;bottom:100px;background:#ccc;color:#000}

#bossBarWrap{position:fixed;top:60px;left:50%;transform:translateX(-50%);width:80%;height:15px;background:#111;border-radius:10px;display:none}
#bossBar{height:100%;background:red;width:100%}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="hud"></div>
<div id="msg">Move • Aim • Shoot • Take Cover • Boss Inside</div>
<div id="crosshair"></div>

<div id="bossBarWrap"><div id="bossBar"></div></div>

<div id="joyBase"><div id="joyStick"></div></div>

<button id="shoot" class="btn">FIRE</button>
<button id="act" class="btn">ACT</button>
<button id="reload" class="btn">R</button>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ========= CHARACTER SYSTEM ========= */

const textures=[
"https://dummyimage.com/256x384/000/00e5ff&text=FINCH",
"https://dummyimage.com/256x384/111/ff2dd1&text=CANEI",
"https://dummyimage.com/256x384/222/ffcc00&text=NATURE",
"https://dummyimage.com/256x384/000/ff334d&text=WAYNE"
];

const loader=new THREE.TextureLoader();

function char(tex,boss=false){
let t=loader.load(tex);
let m=new THREE.MeshBasicMaterial({map:t,transparent:true});
let mesh=new THREE.Mesh(new THREE.PlaneGeometry(boss?3:2,boss?4:3),m);
mesh.position.y=boss?2.5:2;
mesh.onBeforeRender=(r,s,c)=>mesh.lookAt(c.position);
return mesh;
}

/* ========= ENGINE ========= */

const renderer=new THREE.WebGLRenderer({canvas:game});
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
scene.add(new THREE.HemisphereLight(0xffffff,0x222233,1.2));

let S={
x:0,z:10,health:100,ammo:12,maxAmmo:12,
level:1,credits:0,enemies:[],covers:[],
boss:null,inBoss:false,inCover:false
};

let player=char(textures[0]);
scene.add(player);

/* ========= WORLD ========= */

function build(){
scene.clear();
scene.add(player);
S.enemies=[];S.covers=[];S.inBoss=false;

let g=new THREE.Mesh(new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x111}));
g.rotation.x=-Math.PI/2;
scene.add(g);

/* buildings */
for(let i=0;i<40;i++){
let b=new THREE.Mesh(
new THREE.BoxGeometry(4,10+Math.random()*20,4),
new THREE.MeshStandardMaterial({color:0x222244})
);
b.position.set(Math.random()*100-50,b.geometry.parameters.height/2,Math.random()*100-50);
scene.add(b);
}

/* cover */
for(let i=0;i<10;i++){
let c=new THREE.Mesh(
new THREE.BoxGeometry(6,2,2),
new THREE.MeshStandardMaterial({color:0x333})
);
c.position.set(Math.random()*60-30,1,Math.random()*60-30);
scene.add(c);
S.covers.push(c);
}

/* boss zone */
S.zone=new THREE.Mesh(
new THREE.CylinderGeometry(6,6,.3,20),
new THREE.MeshBasicMaterial({color:0xff0000,transparent:true,opacity:.6})
);
S.zone.rotation.x=-Math.PI/2;
S.zone.position.set(0,0,60);
scene.add(S.zone);

spawn();
}

/* ========= ENEMIES ========= */

function spawn(){
for(let i=0;i<5+S.level;i++){
let e=char(textures[Math.floor(Math.random()*textures.length)]);
e.position.set(Math.random()*40-20,2,Math.random()*40-20);
scene.add(e);
S.enemies.push({mesh:e,hp:20+S.level*5});
}
}

/* ========= BOSS ========= */

function bossRoom(){
scene.clear();
scene.add(player);
S.inBoss=true;

let f=new THREE.Mesh(new THREE.PlaneGeometry(60,60),
new THREE.MeshStandardMaterial({color:0x111}));
f.rotation.x=-Math.PI/2;
scene.add(f);

let b=char(textures[1],true);
b.position.set(0,2,0);
scene.add(b);

S.boss={mesh:b,hp:300+S.level*100,max:300+S.level*100};
bossBarWrap.style.display="block";
}

/* ========= SHOOT ========= */

shoot.onclick=()=>{
if(S.ammo<=0)return;
S.ammo--;

let ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);

if(S.inBoss){
let hit=ray.intersectObject(S.boss.mesh);
if(hit.length){
S.boss.hp-=10;
bossBar.style.width=(S.boss.hp/S.boss.max*100)+"%";
if(S.boss.hp<=0){build();S.level++;}
return;
}
}

let hit=ray.intersectObjects(S.enemies.map(e=>e.mesh));
if(hit.length){
let e=S.enemies.find(x=>x.mesh===hit[0].object);
e.hp-=10;
if(e.hp<=0){
scene.remove(e.mesh);
S.enemies=S.enemies.filter(x=>x!==e);
}
}
};

/* ========= ACT ========= */

act.onclick=()=>{
if(Math.hypot(S.x,S.z-60)<6)bossRoom();
};

/* ========= MOVE ========= */

window.addEventListener("touchmove",e=>{
let t=e.touches[0];
S.x+=(t.clientX-innerWidth/2)/300;
S.z+=(t.clientY-innerHeight/2)/300;
});

/* ========= LOOP ========= */

function loop(){
requestAnimationFrame(loop);

camera.position.set(S.x,2,S.z+8);
player.position.set(S.x,2,S.z);

S.enemies.forEach(e=>{
let dx=S.x-e.mesh.position.x;
let dz=S.z-e.mesh.position.z;
let d=Math.hypot(dx,dz);
e.mesh.position.x+=dx/d*0.03;
e.mesh.position.z+=dz/d*0.03;
});

if(S.inBoss){
let b=S.boss.mesh;
let dx=S.x-b.position.x;
let dz=S.z-b.position.z;
let d=Math.hypot(dx,dz);
b.position.x+=dx/d*0.05;
b.position.z+=dz/d*0.05;
}

S.inCover=false;
S.covers.forEach(c=>{
if(Math.hypot(S.x-c.position.x,S.z-c.position.z)<4){
S.inCover=true;
}
});

hud.innerHTML=
"Level:"+S.level+
"<br>Health:"+S.health+
"<br>Ammo:"+S.ammo+
"<br>Credits:"+S.credits+
"<br>Cover:"+(S.inCover?"YES":"NO");

renderer.render(scene,camera);
}

build();
loop();
</script>

</body>
</html>
