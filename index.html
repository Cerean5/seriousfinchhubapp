<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinchStream</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070f1c;
color:#fff;
}

.container{width:92%;margin:auto}

h1,h2{margin:10px 0}

.card{
background:#121c3f;
padding:20px;
margin:15px 0;
border-radius:12px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#ff3c5c;
color:#fff;
cursor:pointer;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:none;
}

.song{
background:#1a2550;
padding:12px;
margin:8px 0;
border-radius:8px;
}

.radio-btn{
background:#222;
padding:10px;
margin:5px;
display:inline-block;
cursor:pointer;
border-radius:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.small{color:#aaa;font-size:12px}
</style>
</head>

<body>

<div class="container">

<h1>🔥 FinchStream</h1>

<!-- RADIO -->
<div class="card">
<h2>📻 Live Radio</h2>

<h3 id="nowPlaying">Select a station</h3>
<audio id="player" controls style="width:100%"></audio>
<p id="radioStatus" class="small">Ready</p>

<h3>Play Inside Site</h3>
<div id="radioStreams" class="grid"></div>

<h3 style="margin-top:20px;">Official Stations</h3>
<div class="grid">
<a href="https://www.hot97.com/listen-live/" target="_blank" class="radio-btn">HOT 97</a>
<a href="https://power1051.iheart.com/" target="_blank" class="radio-btn">Power 105</a>
<a href="https://z100.iheart.com/" target="_blank" class="radio-btn">Z100</a>
<a href="https://www.siriusxm.com/channels/shade-45" target="_blank" class="radio-btn">Shade 45</a>
</div>

</div>

<!-- SUBMIT -->
<div class="card">
<h2>🎵 Submit Song</h2>
<form id="songForm" action="https://formspree.io/f/mjgaajoq" method="POST">
<input name="artist" id="artist" placeholder="Artist Name" required>
<input name="title" id="title" placeholder="Song Title" required>
<input name="link" id="link" placeholder="Song Link" required>
<textarea name="notes" placeholder="Notes"></textarea>
<button type="submit">Submit</button>
</form>
</div>

<!-- ARTIST SIGNUP -->
<div class="card">
<h2>👤 Artist Sign-Up</h2>
<form id="artistForm" action="https://formspree.io/f/mjgaajoq" method="POST">
<input name="name" id="artistName" placeholder="Artist Name" required>
<input name="email" placeholder="Email" required>
<input name="city" placeholder="City" required>
<input name="link" placeholder="Music Link" required>
<textarea name="bio" placeholder="Bio"></textarea>
<button type="submit">Join</button>
</form>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>📊 Stats</h2>
<div id="stats"></div>
</div>

<!-- TRENDING -->
<div class="card">
<h2>🔥 Trending</h2>
<div id="trending"></div>
</div>

<!-- FEED -->
<div class="card">
<h2>🎧 Music Feed</h2>
<div id="feed"></div>
</div>

<!-- ARTIST BOARD -->
<div class="card">
<h2>🎤 Artist Board</h2>
<div id="artists"></div>
</div>

</div>

<script>

// STORAGE
let songs = JSON.parse(localStorage.getItem("songs")||"[]");
let artists = JSON.parse(localStorage.getItem("artists")||"[]");

// RADIO STREAMS (REAL WORKING)
const streams = [
{name:"Hip-Hop",url:"https://listen.181fm.com/181-beat_128k.mp3"},
{name:"Trap",url:"https://stream.zeno.fm/0r0xa792kwzuv"},
{name:"Rap",url:"https://stream.zeno.fm/4wqre23sk2zuv"},
{name:"Urban",url:"https://streaming.live365.com/a57782"}
];

function renderRadio(){
const box=document.getElementById("radioStreams");

streams.forEach(st=>{
let btn=document.createElement("div");
btn.className="radio-btn";
btn.innerText=st.name;

btn.onclick=()=>{
player.src=st.url;
player.play();
nowPlaying.innerText="Now Playing: "+st.name;
radioStatus.innerText="Playing";
};

box.appendChild(btn);
});
}

// SONG SUBMIT
songForm.onsubmit = async (e)=>{
e.preventDefault();

let data={
artist:artist.value,
title:title.value,
link:link.value,
plays:0
};

songs.unshift(data);
localStorage.setItem("songs",JSON.stringify(songs));

renderAll();

fetch(songForm.action,{
method:"POST",
body:new FormData(songForm),
headers:{Accept:"application/json"}
});

songForm.reset();
};

// ARTIST SUBMIT
artistForm.onsubmit = async (e)=>{
e.preventDefault();

let data={
name:artistName.value
};

artists.unshift(data);
localStorage.setItem("artists",JSON.stringify(artists));

renderArtists();

fetch(artistForm.action,{
method:"POST",
body:new FormData(artistForm),
headers:{Accept:"application/json"}
});

artistForm.reset();
};

// PLAY SONG
function playSong(i){
songs[i].plays++;
localStorage.setItem("songs",JSON.stringify(songs));
player.src=songs[i].link;
player.play();
renderTrending();
}

// FEED
function renderFeed(){
feed.innerHTML="";
songs.forEach((s,i)=>{
feed.innerHTML+=`
<div class="song">
<strong>${s.artist}</strong><br>
${s.title}<br>
<button onclick="playSong(${i})">Play</button>
</div>`;
});
}

// TRENDING
function renderTrending(){
trending.innerHTML="";
[...songs].sort((a,b)=>b.plays-a.plays).slice(0,5).forEach(s=>{
trending.innerHTML+=`
<div class="song">${s.artist} - ${s.title} (${s.plays})</div>`;
});
}

// ARTISTS
function renderArtists(){
artists.innerHTML="";
artists.forEach(a=>{
artists.innerHTML+=`<div class="song">${a.name}</div>`;
});
}

// STATS
function renderStats(){
stats.innerHTML="Songs: "+songs.length+"<br>Artists: "+artists.length;
}

function renderAll(){
renderFeed();
renderTrending();
renderStats();
renderArtists();
}

renderRadio();
renderAll();

</script>

</body>
</html>
