<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Finch Mobile FPS</title>

<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:Arial}

/* HUD */
#hud{
position:fixed;
top:10px;left:10px;
z-index:10;
font-size:14px;
}

/* CROSSHAIR */
#crosshair{
position:fixed;
top:50%;left:50%;
width:20px;height:20px;
margin-left:-10px;margin-top:-10px;
border:2px solid #fff;
border-radius:50%;
}

/* JOYSTICK */
#joy{
position:fixed;
bottom:40px;left:30px;
width:120px;height:120px;
background:rgba(255,255,255,.1);
border-radius:50%;
}
#stick{
position:absolute;
width:50px;height:50px;
background:#fff;
border-radius:50%;
left:35px;top:35px;
}

/* BUTTONS */
#shoot{
position:fixed;
bottom:60px;right:30px;
width:80px;height:80px;
border-radius:50%;
background:red;
display:flex;align-items:center;justify-content:center;
font-weight:bold;
}

#bass{
position:fixed;
bottom:150px;right:30px;
width:60px;height:60px;
border-radius:50%;
background:cyan;
color:#000;
display:flex;align-items:center;justify-content:center;
font-weight:bold;
}

/* MUSIC BUTTON */
#play{
position:fixed;
top:10px;right:10px;
z-index:20;
padding:10px;
background:#0ff;
color:#000;
border:none;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="hud">Level 1 | Beat x1</div>
<div id="crosshair"></div>

<div id="joy"><div id="stick"></div></div>
<div id="shoot">FIRE</div>
<div id="bass">DROP</div>

<button id="play" onclick="startMusic()">PLAY</button>
<audio id="music" src="your-song.mp3" loop></audio>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.set(0,2,5);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x444444));

// FLOOR
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshBasicMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// BUILDINGS
for(let i=0;i<20;i++){
const b = new THREE.Mesh(
new THREE.BoxGeometry(2,Math.random()*10+2,2),
new THREE.MeshBasicMaterial({color:0x222244})
);
b.position.set(Math.random()*50-25,b.geometry.parameters.height/2,Math.random()*50-25);
scene.add(b);
}

// STATE
let level=1;
let targets=[];
let beatPower=1;
let beatTimer=0;

// AUDIO
let audioCtx, analyser, dataArray;
let music = document.getElementById("music");

window.startMusic = function(){
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const source = audioCtx.createMediaElementSource(music);
analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;
source.connect(analyser);
analyser.connect(audioCtx.destination);
dataArray = new Uint8Array(analyser.frequencyBinCount);
music.play();
};

// SPAWN
function spawn(){
targets.forEach(t=>scene.remove(t));
targets=[];
for(let i=0;i<level*3;i++){
const t = new THREE.Mesh(
new THREE.SphereGeometry(1,16,16),
new THREE.MeshBasicMaterial({color:0x00ffff})
);
t.position.set(Math.random()*40-20,2,Math.random()*40-20);
t.userData={health:level};
scene.add(t);
targets.push(t);
}
}

// BEAT SYSTEM (REAL)
function updateBeat(){
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let sum=0;
for(let i=0;i<dataArray.length;i++){
sum+=dataArray[i];
}

let avg=sum/dataArray.length;

if(avg>140){
beatPower=2.5;
document.body.style.transform="scale(1.02)";
}else if(avg>100){
beatPower=2;
document.body.style.transform="scale(1.01)";
}else{
beatPower=1;
document.body.style.transform="scale(1)";
}

document.getElementById("hud").innerText =
"Level "+level+" | Beat x"+beatPower.toFixed(1);

// AUTO BASS DROP
if(avg>160){
bassDrop();
}
}

// SHOOT
function shoot(){
const ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);
const hit=ray.intersectObjects(targets);

if(hit.length){
let e=hit[0].object;
e.userData.health-=beatPower;

if(e.userData.health<=0){
scene.remove(e);
targets=targets.filter(t=>t!==e);
}

if(targets.length==0){
level++;
spawn();
}
}
}

// BASS DROP
function bassDrop(){
targets.forEach(t=>scene.remove(t));
targets=[];
level++;
spawn();
alert("💥 BASS DROP!");
}

// CONTROLS
let moveX=0,moveY=0;
const joy=document.getElementById("joy");
const stick=document.getElementById("stick");

joy.addEventListener("touchmove",e=>{
const rect=joy.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left-60;
let y=e.touches[0].clientY-rect.top-60;

const dist=Math.sqrt(x*x+y*y);
if(dist>50){x*=50/dist;y*=50/dist;}

stick.style.left=(x+60-25)+"px";
stick.style.top=(y+60-25)+"px";

moveX=x/50;
moveY=y/50;
});

joy.addEventListener("touchend",()=>{
moveX=0;moveY=0;
stick.style.left="35px";
stick.style.top="35px";
});

// LOOK
let lastX=0,lastY=0;
window.addEventListener("touchmove",e=>{
let t=e.touches[0];
if(t.clientX>innerWidth/2){
camera.rotation.y-=(t.clientX-lastX)*0.002;
camera.rotation.x-=(t.clientY-lastY)*0.002;
}
lastX=t.clientX;
lastY=t.clientY;
});

// BUTTONS
document.getElementById("shoot").ontouchstart=shoot;
document.getElementById("bass").ontouchstart=bassDrop;

// LOOP
function animate(){
requestAnimationFrame(animate);

updateBeat();

camera.position.x+=moveX*0.3;
camera.position.z+=moveY*0.3;

renderer.render(scene,camera);
}

spawn();
animate();

</script>
</body>
</html>
