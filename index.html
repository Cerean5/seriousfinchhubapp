<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch Artist Growth Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1511379938547-c1f69419868d");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:40px;
}

.hero-content{
max-width:650px;
}

.tag{
color:#ff3d3d;
letter-spacing:3px;
font-size:14px;
margin-bottom:15px;
}

.hero h1{
font-size:72px;
line-height:1;
margin-bottom:30px;
font-weight:900;
}

.buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:15px 30px;
border-radius:40px;
border:none;
font-weight:bold;
cursor:pointer;
}

.primary{
background:linear-gradient(90deg,#ff003c,#ff3d3d);
color:white;
}

.secondary{
background:white;
color:black;
}

/* HUB SECTION */

.section{
padding:60px 25px;
max-width:1100px;
margin:auto;
}

.card{
background:#0f1c3a;
padding:30px;
border-radius:12px;
margin-bottom:30px;
}

.radio-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.radio{
background:#2f45ff;
padding:15px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

audio{
width:100%;
margin-top:20px;
}
</style>
</head>

<body>

<section class="hero">

<div class="hero-content">

<div class="tag">OFFICIAL ARTIST HUB</div>

<h1>SERIOUS<br>FINCH</h1>

<div class="buttons">

<button class="btn primary"
onclick="document.getElementById('hub').scrollIntoView()">
ARTIST GROWTH HUB
</button>

<button class="btn secondary"
onclick="playDemo()">
▶ LATEST DROP
</button>

</div>

</div>

</section>

<section id="hub" class="section">

<div class="card">

<h2>Music Player</h2>

<audio id="player" controls></audio>

<button class="btn primary" onclick="playDemo()">
Play Demo
</button>

</div>

<div class="card">

<h2>Top American Radio Stations</h2>

<div class="radio-grid">

<div class="radio" onclick="playRadio('https://stream.revma.ihrhls.com/zc1465')">Z100 New York</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KIISFMAAC.aac')">KIIS FM Los Angeles</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WQHTFMAAC.aac')">HOT 97 New York</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KPWRFMAAC.aac')">Power 106 Los Angeles</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WWPRFMAAC.aac')">Power 105.1 New York</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WBLSFMAAC.aac')">WBLS New York</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WGCIAMAAC.aac')">WGCI Chicago</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KDAYFMAAC.aac')">93.5 KDAY Los Angeles</div>

</div>

</div>

</section>

<script>

const player = document.getElementById("player");

function playDemo(){
player.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
player.play();
}

function playRadio(url){
player.src=url;
player.play();
}

</script>

</body>
</html>
