<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch Hub</title>

<style>

:root{
--bg1:#071025;
--bg2:#0c173a;
--card:#111c45;
--text:#ffffff;
--muted:#aab7e8;
--red:#ff2a2a;
--line:rgba(255,255,255,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
background:
radial-gradient(circle at 20% 0%, rgba(255,40,40,.18), transparent 40%),
radial-gradient(circle at 80% 0%, rgba(60,120,255,.18), transparent 40%),
linear-gradient(180deg,var(--bg1),var(--bg2));
}

header{
padding:25px;
text-align:center;
font-size:30px;
font-weight:bold;
}

/* HERO */

.hero{
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
color:var(--muted);
margin-bottom:30px;
}

.hero button{
padding:14px 30px;
border:none;
border-radius:30px;
background:var(--red);
color:white;
font-size:16px;
cursor:pointer;
}

/* LAYOUT */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* CARDS */

.card{
background:var(--card);
padding:20px;
border-radius:14px;
border:1px solid var(--line);
}

audio{
width:100%;
margin-top:15px;
}

/* RADIO */

.radio-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:15px;
}

.radio{
background:#2f45ff;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

/* FORM */

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button.submit{
background:var(--red);
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
color:var(--muted);
font-size:14px;
}

</style>
</head>

<body>

<header>
Serious Finch Hub
</header>

<section class="hero">

<h1>Artist Growth Hub</h1>

<p>Submit music • Grow streams • Connect with radio</p>

<button onclick="enterHub()">Enter Hub</button>

</section>

<div class="container" id="hub">

<div class="grid">

<div class="card">

<h3>Radio Player</h3>

<audio id="player" controls></audio>

<div style="margin-top:10px;display:flex;gap:10px">

<button class="submit" onclick="previousStation()">◀ Prev</button>
<button class="submit" onclick="nextStation()">Next ▶</button>

</div>

</div>

<div class="card">

<h3>Top American Radio Stations</h3>

<div class="radio-grid">

<div class="radio" onclick="setStation(0)">Z100</div>
<div class="radio" onclick="setStation(1)">KIIS FM</div>
<div class="radio" onclick="setStation(2)">HOT 97</div>
<div class="radio" onclick="setStation(3)">Power 106</div>
<div class="radio" onclick="setStation(4)">Power 105.1</div>
<div class="radio" onclick="setStation(5)">WBLS</div>
<div class="radio" onclick="setStation(6)">WGCI</div>
<div class="radio" onclick="setStation(7)">93.5 KDAY</div>
<div class="radio" onclick="setStation(8)">Q102</div>

</div>

</div>

<div class="card">

<h3>Artist Submission</h3>

<form action="https://formspree.io/f/mjgaajoq" method="POST">

<input type="text" name="artist" placeholder="Artist Name" required>

<input type="text" name="song" placeholder="Song Link" required>

<textarea name="message" placeholder="Message"></textarea>

<button class="submit" type="submit">Submit Music</button>

</form>

</div>

</div>

</div>

<footer>

Serious Finch Hub © 2026

</footer>

<script>

const stations=[

"https://stream.revma.ihrhls.com/zc1465",
"https://playerservices.streamtheworld.com/api/livestream-redirect/KIISFMAAC.aac",
"https://playerservices.streamtheworld.com/api/livestream-redirect/WQHTFMAAC.aac",
"https://playerservices.streamtheworld.com/api/livestream-redirect/KPWRFMAAC.aac",
"https://playerservices.streamtheworld.com/api/livestream-redirect/WWPRFMAAC.aac",
"https://playerservices.streamtheworld.com/api/livestream-redirect/WBLSFMAAC.aac",
"https://playerservices.streamtheworld.com/api/livestream-redirect/WGCIAMAAC.aac",
"https://playerservices.streamtheworld.com/api/livestream-redirect/KDAYFMAAC.aac",
"https://playerservices.streamtheworld.com/api/livestream-redirect/KRBQFMAAC.aac"

]

let currentStation=0

const player=document.getElementById("player")

function setStation(index){
currentStation=index
player.src=stations[index]
player.play()
}

function nextStation(){
currentStation++
if(currentStation>=stations.length){currentStation=0}
setStation(currentStation)
}

function previousStation(){
currentStation--
if(currentStation<0){currentStation=stations.length-1}
setStation(currentStation)
}

function enterHub(){
document.getElementById("hub").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
