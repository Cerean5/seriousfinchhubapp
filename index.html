<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sons of Gunsmoke: Neon City</title>

<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
canvas{display:block}

#hud{
position:fixed;top:10px;left:10px;
background:rgba(0,0,0,.7);
padding:10px;border-radius:10px;
}

#crosshair{
position:fixed;left:50%;top:50%;
width:20px;height:20px;
transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
content:"";position:absolute;background:#fff;
}
#crosshair:before{width:2px;height:20px;left:9px}
#crosshair:after{width:20px;height:2px;top:9px}

#shoot{
position:fixed;bottom:30px;right:30px;
background:#ff3344;padding:20px;
border-radius:50%;font-weight:bold;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="hud">Loading...</div>
<div id="crosshair"></div>
<div id="shoot">FIRE</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ========= SCENE ========= */

const renderer=new THREE.WebGLRenderer({canvas:game});
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x05070d,20,200);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);

/* ========= LIGHT ========= */

scene.add(new THREE.HemisphereLight(0xffffff,0x222233,1.2));

/* ========= CITY ========= */

function buildCity(){
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(300,300),
new THREE.MeshStandardMaterial({color:0x0a0a0f})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

for(let i=0;i<120;i++){
const h=Math.random()*40+10;
const b=new THREE.Mesh(
new THREE.BoxGeometry(4,h,4),
new THREE.MeshStandardMaterial({
color:0x111122,
emissive:Math.random()>0.7?0x00e5ff:0x000000
})
);
b.position.set(
(Math.random()*200)-100,
h/2,
(Math.random()*200)-100
);
scene.add(b);
}
}
buildCity();

/* ========= PLAYER ========= */

const player=new THREE.Group();

const body=new THREE.Mesh(
new THREE.CapsuleGeometry(.4,1,4,8),
new THREE.MeshStandardMaterial({color:0x111111})
);
body.position.y=1;
player.add(body);

const visor=new THREE.Mesh(
new THREE.BoxGeometry(.5,.1,.1),
new THREE.MeshBasicMaterial({color:0x00e5ff})
);
visor.position.set(0,1.8,.3);
player.add(visor);

scene.add(player);

/* ========= STATE ========= */

let px=0,pz=10;
let level=1;
let enemies=[];

/* ========= ENEMIES ========= */

function spawn(){
enemies.forEach(e=>scene.remove(e));
enemies=[];

for(let i=0;i<5+level;i++){
const e=new THREE.Mesh(
new THREE.CapsuleGeometry(.4,1,4,8),
new THREE.MeshStandardMaterial({color:0xff3333})
);
e.position.set(
(Math.random()*60)-30,
1,
(Math.random()*60)-30
);
scene.add(e);
enemies.push(e);
}
}
spawn();

/* ========= SHOOT ========= */

shoot.onclick=()=>{
const ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);
const hit=ray.intersectObjects(enemies);

if(hit.length){
scene.remove(hit[0].object);
enemies=enemies.filter(x=>x!==hit[0].object);

if(enemies.length===0){
level++;
spawn();
}
}
};

/* ========= CONTROLS ========= */

window.addEventListener("touchmove",e=>{
const t=e.touches[0];
px+=(t.clientX-innerWidth/2)/300;
pz+=(t.clientY-innerHeight/2)/300;
});

/* ========= LOOP ========= */

function animate(){
requestAnimationFrame(animate);

camera.position.set(px,2,pz+8);
player.position.set(px,0,pz);

enemies.forEach(e=>{
const dx=px-e.position.x;
const dz=pz-e.position.z;
const d=Math.hypot(dx,dz);
e.position.x+=dx/d*0.03;
e.position.z+=dz/d*0.03;
});

hud.innerHTML="Level "+level+"<br>Enemies "+enemies.length;

renderer.render(scene,camera);
}
animate();

/* ========= RESIZE ========= */

window.onresize=()=>{
renderer.setSize(innerWidth,innerHeight);
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
};
</script>

</body>
</html>
