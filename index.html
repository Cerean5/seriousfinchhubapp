<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch × Sons of Gunsmoke</title>
<link rel="manifest" href="manifest.json"><style>
body{margin:0;background:#000;color:#fff;font-family:Arial}

/* HERO */
.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:opacity 1s ease;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.3));
}

.hero-content{position:relative;z-index:2}
.hero h1{
font-size:4rem;
letter-spacing:4px;
margin:0;
}
.hero p{color:#ccc;margin:10px 0;font-size:18px}

.btn{
padding:16px 34px;
margin:8px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:bold;
font-size:18px;
}

.primary{
background:#ff2d55;
color:#fff;
box-shadow:0 0 25px rgba(255,45,85,.6);
}
.secondary{background:transparent;color:#fff;border:1px solid #555}

.section{padding:80px 20px;text-align:center}

iframe{width:100%;max-width:700px;height:380px;border:none;margin-top:20px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.grid img{width:100%;border-radius:14px}
.grid img:first-child{grid-column:span 2}

</style></head><body><!-- HERO --><div class="hero">
<div id="s1" class="slide" style="background-image:url('image-hero-1.jpg');opacity:1"></div>
<div id="s2" class="slide" style="background-image:url('image-hero-2.jpg');opacity:0"></div>
<div id="s3" class="slide" style="background-image:url('image-hero-3.jpg');opacity:0"></div>
<div class="overlay"></div><div class="hero-content">
<h1>WHY SO SERIOUS</h1>
<p>Serious Finch × Sons of Gunsmoke</p><button class="btn primary" onclick="go('spotify')">STREAM NOW</button> <button class="btn secondary" onclick="go('youtube')">WATCH VIDEO</button>

</div>
</div><!-- VIDEO --><div class="section">
<h2>Official Video</h2>
<iframe src="https://www.youtube.com/embed/L6qnsBgi2ZQ"></iframe>
</div><!-- STREAM --><div class="section">
<h2>Listen</h2>
<iframe src="https://open.spotify.com/embed/track/7zEJAr3odmPEhBiywgqafV"></iframe>
</div><!-- VISUALS --><div class="section">
<h2>Visuals</h2>
<div class="grid">
<img src="image-hero-1.jpg">
<img src="image-hero-2.jpg">
<img src="image-hero-3.jpg">
</div>
</div><script>

const LINKS={
spotify:"https://open.spotify.com/track/7zEJAr3odmPEhBiywgqafV",
youtube:"https://youtube.com/watch?v=L6qnsBgi2ZQ"
};

function go(p){
window.open(LINKS[p],"_blank");
}

let slides=["s1","s2","s3"];
let i=0;
setInterval(()=>{
document.getElementById(slides[i]).style.opacity=0;
i=(i+1)%3;
document.getElementById(slides[i]).style.opacity=1;
},4000);

</script></body>
</html>
