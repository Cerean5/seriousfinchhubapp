<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHY SO SERIOUS — Serious Finch × Sons of Gunsmoke</title><style>
body{margin:0;background:#000;color:#fff;font-family:Inter,Arial;overflow-x:hidden}

/* INTRO */
#intro{
position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:999;
animation:fadeOut 3s ease forwards;animation-delay:2s;
}
#intro h1{font-size:3.5rem;letter-spacing:10px;animation:pulse 2s infinite alternate}

@keyframes pulse{from{opacity:.6}to{opacity:1}}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* HERO */
.hero{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;filter:brightness(.55);
transition:opacity 1.5s ease, transform 10s ease;transform:scale(1.15)}
.overlay{position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,.95), rgba(0,0,0,.1))}
.hero-content{position:relative;z-index:2;animation:rise 1.5s ease}

@keyframes rise{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}

.hero h1{font-size:5rem;letter-spacing:12px;margin:0}
.hero p{color:#aaa;font-size:18px;letter-spacing:3px;margin-top:14px}

.btn{padding:20px 50px;margin:12px;border:none;border-radius:60px;font-weight:800;font-size:18px;cursor:pointer;transition:.3s}
.btn:hover{transform:scale(1.1)}
.primary{background:#ff2d55;color:#fff;box-shadow:0 0 60px rgba(255,45,85,1)}
.secondary{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}

.section{padding:140px 20px;text-align:center;max-width:1100px;margin:auto;animation:fadeIn 1.5s ease}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.section h2{letter-spacing:6px;font-size:2.2rem}
.section p{color:#aaa;max-width:600px;margin:auto;line-height:1.6}

iframe{width:100%;max-width:800px;height:450px;border:none;margin-top:40px;border-radius:16px;box-shadow:0 20px 80px rgba(0,0,0,.9)}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px;margin-top:50px}
.grid img{width:100%;border-radius:20px;box-shadow:0 25px 80px rgba(0,0,0,1);transition:.5s}
.grid img:hover{transform:scale(1.1)}
.grid img:first-child{grid-column:span 2}

footer{padding:80px 20px;text-align:center;color:#444;border-top:1px solid #111}

</style></head><body><!-- INTRO --><div id="intro"><h1>SERIOUS FINCH</h1></div><!-- HERO --><div class="hero">
<div id="s1" class="slide"></div>
<div id="s2" class="slide"></div>
<div id="s3" class="slide"></div>
<div class="overlay"></div><div class="hero-content">
<h1>WHY SO SERIOUS</h1>
<p>Serious Finch × Sons of Gunsmoke</p><button class="btn primary" onclick="go('spotify')">STREAM NOW</button> <button class="btn secondary" onclick="go('youtube')">WATCH VIDEO</button>

</div>
</div><!-- VIDEO --><div class="section">
<h2>OFFICIAL VIDEO</h2>
<iframe src="https://www.youtube.com/embed/L6qnsBgi2ZQ?autoplay=1&mute=1"></iframe>
</div><!-- STREAM --><div class="section">
<h2>LISTEN</h2>
<iframe src="https://open.spotify.com/embed/track/7zEJAr3odmPEhBiywgqafV"></iframe>
</div><!-- STORY --><div class="section">
<h2>THE MOVEMENT</h2>
<p>
Serious Finch × Sons of Gunsmoke isn’t just music — it’s pressure, identity, and presence. This is a rollout. This is a statement.
</p>
</div><!-- VISUALS --><div class="section">
<h2>VISUALS</h2>
<div class="grid">
<img src="https://cerean5.github.io/seriousfinchhubapp/image-hero-1.jpg">
<img src="https://cerean5.github.io/seriousfinchhubapp/image-hero-2.jpg">
<img src="https://cerean5.github.io/seriousfinchhubapp/image-hero-3.jpg">
</div>
</div><footer>
© Serious Finch × Sons of Gunsmoke
</footer><script>
const IMAGES=[
"https://cerean5.github.io/seriousfinchhubapp/image-hero-1.jpg",
"https://cerean5.github.io/seriousfinchhubapp/image-hero-2.jpg",
"https://cerean5.github.io/seriousfinchhubapp/image-hero-3.jpg"
];

let slides=["s1","s2","s3"];
let i=0;

slides.forEach((id,index)=>{
document.getElementById(id).style.backgroundImage=`url(${IMAGES[index]})`;
});

setInterval(()=>{
document.getElementById(slides[i]).style.opacity=0;
i=(i+1)%3;
document.getElementById(slides[i]).style.opacity=1;
},6000);

const LINKS={
spotify:"https://open.spotify.com/track/7zEJAr3odmPEhBiywgqafV",
youtube:"https://youtube.com/watch?v=L6qnsBgi2ZQ"
};

function go(p){window.open(LINKS[p],"_blank");}
</script></body>
</html>
