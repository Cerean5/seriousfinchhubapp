<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serious Finch</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:white;
}

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:black;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:.5;
}

.hero h1{
font-family:'Orbitron',sans-serif;
font-size:80px;
z-index:10;
}

.section{
padding:120px 20px;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
}

iframe{
width:100%;
border-radius:10px;
}

button{
padding:12px 20px;
background:#ff0000;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
border-top:1px solid #333;
}

</style>

</head>

<body>

<nav>

<div><b>SERIOUS FINCH</b></div>

<div>

<a href="#music">Music</a>

<a href="https://youtube.com/@seriousf1nch" target="_blank">YouTube</a>

<a href="https://open.spotify.com/artist/2Nil52pQrjFepfxOi8aYY0" target="_blank">Spotify</a>

<a href="/hub">Artist Hub</a>

</div>

</nav>

<section class="hero">

<video autoplay muted loop playsinline>

<source src="hero-bg.mp4" type="video/mp4">

</video>

<h1>SERIOUS<br>FINCH</h1>

</section>

<section id="music" class="section">

<h2>Latest Music</h2>

<div class="grid">

<div class="card">

<h3>Latest Single</h3>

<iframe src="https://open.spotify.com/embed/track/5YEBWTiJxIsqNA15LIKk4B"></iframe>

</div>

<div class="card">

<h3>Artist Profile</h3>

<iframe src="https://open.spotify.com/embed/artist/2Nil52pQrjFepfxOi8aYY0"></iframe>

</div>

</div>

</section>

<section class="section">

<h2>Latest Video</h2>

<div class="card">

<iframe height="450" src="https://www.youtube.com/embed/3VUL8YdMftg"></iframe>

</div>

</section>

<section class="section">

<h2>Short Videos</h2>

<div class="grid">

<iframe height="400" src="https://www.youtube.com/embed/36dmFgGrglg"></iframe>

<iframe height="400" src="https://www.youtube.com/embed/3TUuY2WnLvg"></iframe>

<iframe height="400" src="https://www.youtube.com/embed/8RtybrFZb5U"></iframe>

<iframe height="400" src="https://www.youtube.com/embed/9ZBHn_4nRac"></iframe>

</div>

</section>

<footer>

<p>© 2026 Serious Finch</p>

</footer>

</body>
</html>
