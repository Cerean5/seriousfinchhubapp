<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>Neon Warlords: Siege City</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#00e5ff">
<style>
  :root{
    --panel:rgba(0,0,0,.62);
    --line:rgba(255,255,255,.14);
    --cyan:#00e5ff;
    --red:#ff334d;
    --yellow:#ffd54d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial,sans-serif;touch-action:none}
  canvas{display:block}
  .panel{
    position:fixed;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;backdrop-filter:blur(8px);z-index:20
  }
  #hud{top:10px;left:10px;padding:10px 12px;font-size:14px;line-height:1.45;max-width:58vw}
  #msg{top:10px;left:50%;transform:translateX(-50%);padding:8px 12px;font-size:13px;max-width:86vw;text-align:center}
  #crosshair{
    position:fixed;left:50%;top:50%;width:24px;height:24px;
    transform:translate(-50%,-50%);z-index:15;pointer-events:none;
    filter:drop-shadow(0 0 8px rgba(255,255,255,.7))
  }
  #crosshair:before,#crosshair:after{content:"";position:absolute;background:#fff}
  #crosshair:before{width:2px;height:24px;left:11px;top:0}
  #crosshair:after{width:24px;height:2px;left:0;top:11px}

  #joyBase{
    position:fixed;left:18px;bottom:18px;width:128px;height:128px;border-radius:50%;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);z-index:25
  }
  #joyStick{
    position:absolute;left:39px;top:39px;width:50px;height:50px;border-radius:50%;
    background:rgba(255,255,255,.78)
  }
  #lookPad{
    position:fixed;right:0;top:0;width:56vw;height:100vh;z-index:10;background:transparent
  }

  .btn{
    position:fixed;z-index:25;border:none;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:800;
    box-shadow:0 10px 25px rgba(0,0,0,.35)
  }
  #shoot{right:18px;bottom:24px;width:84px;height:84px;background:var(--red);color:#fff}
  #act{right:110px;bottom:24px;width:66px;height:66px;background:var(--yellow);color:#111}
  #reload{right:28px;bottom:122px;width:60px;height:60px;background:#ddd;color:#111}
  #upload{position:fixed;top:10px;right:10px;z-index:25;max-width:40vw}

  #bossBarWrap{
    position:fixed;left:50%;top:58px;transform:translateX(-50%);
    width:min(84vw,460px);height:18px;background:rgba(0,0,0,.55);border:1px solid var(--line);
    border-radius:999px;overflow:hidden;z-index:30;display:none
  }
  #bossBar{height:100%;width:100%;background:linear-gradient(90deg,#ff334d,#ff9900)}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="panel"></div>
<div id="msg" class="panel">Move left. Look right. ACT near cover or the red tower gate. FIRE shoots. R reloads.</div>
<div id="crosshair"></div>
<div id="bossBarWrap"><div id="bossBar"></div></div>

<div id="joyBase"><div id="joyStick"></div></div>
<div id="lookPad"></div>

<button id="shoot" class="btn">FIRE</button>
<button id="act" class="btn">ACT</button>
<button id="reload" class="btn">R</button>
<input type="file" id="upload" accept="audio/*">

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ========= ENGINE ========= */

const renderer = new THREE.WebGLRenderer({ canvas: game, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x07101b, 24, 220);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera.rotation.order = "YXZ";

scene.add(new THREE.HemisphereLight(0xffffff, 0x1f2233, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 0.55);
sun.position.set(16, 28, 10);
scene.add(sun);

const hud = document.getElementById("hud");
const msg = document.getElementById("msg");
const bossBarWrap = document.getElementById("bossBarWrap");
const bossBar = document.getElementById("bossBar");
const joyBase = document.getElementById("joyBase");
const joyStick = document.getElementById("joyStick");
const shootBtn = document.getElementById("shoot");
const actBtn = document.getElementById("act");
const reloadBtn = document.getElementById("reload");
const uploadInput = document.getElementById("upload");

/* ========= DATA ========= */

const WARRIORS = [
  { name:"Neon Ronin", color:0x00e5ff, accent:0x8fe8ff },
  { name:"Crimson Vex", color:0xff334d, accent:0xff8895 },
  { name:"Gold Specter", color:0xffcc00, accent:0xffef9c },
  { name:"Void Striker", color:0x8a2be2, accent:0xc79cff },
  { name:"Chrome Phantom", color:0xb8c3d1, accent:0xffffff }
];

const THEMES = [
  { bg:0x07101b, road:0x070b12, building:0x1a2436, neon:0x00e5ff, accent:0x8fe8ff, name:"Azure Sector" },
  { bg:0x120917, road:0x0e0812, building:0x2a1731, neon:0xff2dd1, accent:0xff9bea, name:"Violet Strip" },
  { bg:0x15090c, road:0x120808, building:0x32151d, neon:0xff334d, accent:0xffa0a8, name:"Crimson Ward" },
  { bg:0x151208, road:0x131008, building:0x322918, neon:0xffcc00, accent:0xffef9c, name:"Gold Heights" }
];

function themeForLevel(level){
  return THEMES[(level - 1) % THEMES.length];
}

/* ========= STATE ========= */

const S = {
  x: 0,
  z: 10,
  yaw: 0,
  pitch: 0,
  moveX: 0,
  moveY: 0,

  health: 100,
  ammo: 12,
  maxAmmo: 12,
  reloading: false,

  level: 1,
  credits: 0,

  enemies: [],
  covers: [],
  deco: [],
  bossDoor: null,

  boss: null,
  inBoss: false,

  inCover: false,
  nearCover: null,

  lastShot: 0,
  lastHit: 0,
  lastAct: 0,

  beatPower: 1.15
};

/* ========= HELPERS ========= */

function setMsg(text){
  msg.textContent = text;
}

function stdMat(color, rough=.85, metal=.08, emissive=0, emissiveIntensity=0){
  return new THREE.MeshStandardMaterial({
    color, roughness: rough, metalness: metal, emissive, emissiveIntensity
  });
}

function pushDeco(mesh){
  scene.add(mesh);
  S.deco.push(mesh);
  return mesh;
}

function clearLevel(){
  S.enemies.forEach(e => scene.remove(e.mesh));
  S.covers.forEach(c => scene.remove(c.mesh));
  S.deco.forEach(d => scene.remove(d));
  S.enemies = [];
  S.covers = [];
  S.deco = [];
  S.bossDoor = null;
  if(S.boss?.mesh) scene.remove(S.boss.mesh);
  S.boss = null;
  bossBarWrap.style.display = "none";
}

function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}

/* ========= CHARACTER CREATION ========= */

function createWarrior(type, boss=false){
  const g = new THREE.Group();

  const torso = new THREE.Mesh(
    new THREE.CapsuleGeometry(boss ? 0.8 : 0.38, boss ? 1.9 : 1.0, 6, 12),
    stdMat(0x171922, 0.72, 0.12, type.color, boss ? 0.18 : 0.06)
  );
  torso.position.y = boss ? 2.0 : 1.1;
  g.add(torso);

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(boss ? 0.55 : 0.30, 18, 18),
    stdMat(0xb07f66, 0.9, 0)
  );
  head.position.y = boss ? 3.45 : 2.0;
  g.add(head);

  const visor = new THREE.Mesh(
    new THREE.BoxGeometry(boss ? 0.7 : 0.45, 0.1, 0.1),
    new THREE.MeshBasicMaterial({ color: type.accent })
  );
  visor.position.set(0, boss ? 3.45 : 2.0, boss ? 0.45 : 0.28);
  g.add(visor);

  const aura = new THREE.Mesh(
    new THREE.SphereGeometry(boss ? 1.9 : 1.05, 16, 16),
    new THREE.MeshBasicMaterial({
      color: type.color,
      transparent: true,
      opacity: boss ? 0.14 : 0.08
    })
  );
  aura.position.y = boss ? 2.2 : 1.45;
  g.add(aura);

  function limb(w,h,d,color){
    return new THREE.Mesh(new THREE.BoxGeometry(w,h,d), stdMat(color, .86, .04));
  }

  const la = limb(boss ? 0.22 : 0.16, boss ? 1.1 : 0.72, boss ? 0.22 : 0.16, 0x232630);
  const ra = limb(boss ? 0.22 : 0.16, boss ? 1.1 : 0.72, boss ? 0.22 : 0.16, 0x232630);
  la.position.set(boss ? -0.82 : -0.42, boss ? 2.0 : 1.18, 0);
  ra.position.set(boss ?  0.82 :  0.42, boss ? 2.0 : 1.18, 0);
  g.add(la, ra);

  const ll = limb(boss ? 0.24 : 0.18, boss ? 1.2 : 0.84, boss ? 0.24 : 0.18, 0x11151d);
  const rl = limb(boss ? 0.24 : 0.18, boss ? 1.2 : 0.84, boss ? 0.24 : 0.18, 0x11151d);
  ll.position.set(boss ? -0.28 : -0.16, boss ? 0.7 : 0.35, 0);
  rl.position.set(boss ?  0.28 :  0.16, boss ? 0.7 : 0.35, 0);
  g.add(ll, rl);

  g.userData.parts = { la, ra, ll, rl, type };
  return g;
}

function animateWarrior(group, stride){
  const p = group.userData.parts;
  if(!p) return;
  const s = Math.sin(stride);
  p.la.rotation.x = s * 0.7;
  p.ra.rotation.x = -s * 0.7;
  p.ll.rotation.x = -s * 0.9;
  p.rl.rotation.x = s * 0.9;
}

/* ========= PLAYER ========= */

const playerType = WARRIORS[0];
const player = createWarrior(playerType, false);
scene.add(player);

/* ========= CITY ========= */

function addRoad(x,z,w,h,color){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,h), new THREE.MeshBasicMaterial({ color }));
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.02, z);
  pushDeco(m);
}

function addLane(x,z,w,h,color){
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w,h),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.55 })
  );
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.03, z);
  pushDeco(m);
}

function addBuilding(x,z,w,h,d,color,neon){
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    stdMat(color, .82, .15, neon, .08)
  );
  body.position.set(x, h/2, z);
  pushDeco(body);

  const trim = new THREE.Mesh(
    new THREE.BoxGeometry(w * .88, .22, .22),
    new THREE.MeshBasicMaterial({ color: neon })
  );
  trim.position.set(x, h - 1, z + d/2 + .15);
  pushDeco(trim);

  for(let y=4; y<h-2; y+=4){
    for(let wx=-w/2+2.2; wx<=w/2-2.2; wx+=3.2){
      const win = new THREE.Mesh(
        new THREE.BoxGeometry(1.1,1,.14),
        new THREE.MeshBasicMaterial({
          color: Math.random() > .4 ? neon : 0xffffdd,
          transparent: true,
          opacity: .8
        })
      );
      win.position.set(x + wx, y, z + d/2 + .1);
      pushDeco(win);
    }
  }
}

function addCover(x,z,w=6,h=2,d=2,color=0x333333){
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), stdMat(color, .9, .03));
  mesh.position.set(x, h/2, z);
  scene.add(mesh);
  S.covers.push({ mesh, w, d });
}

function addBossDoor(x,z){
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(6,6,.4,20),
    new THREE.MeshBasicMaterial({ color:0xff0000, transparent:true, opacity:.65 })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, .22, z);
  pushDeco(mesh);
  S.bossDoor = { x, z, mesh };
}

function buildCity(){
  clearLevel();
  S.inBoss = false;
  S.inCover = false;
  S.nearCover = null;

  const theme = themeForLevel(S.level);
  scene.background = new THREE.Color(theme.bg);
  scene.fog = new THREE.Fog(theme.bg, 24, 220);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(320,320),
    stdMat(0x10151f, .96, .02)
  );
  ground.rotation.x = -Math.PI / 2;
  pushDeco(ground);

  addRoad(0,0,20,280,theme.road);
  addRoad(0,0,280,20,theme.road);
  addRoad(-70,0,16,280,theme.road);
  addRoad(70,0,16,280,theme.road);
  addRoad(0,-70,280,16,theme.road);
  addRoad(0,70,280,16,theme.road);

  for(let z=-126; z<=126; z+=14){
    addLane(0,z,.35,7,theme.neon);
    addLane(-70,z,.35,7,theme.accent);
    addLane(70,z,.35,7,0xffcc00);
  }
  for(let x=-126; x<=126; x+=14){
    addLane(x,0,7,.35,theme.accent);
    addLane(x,-70,7,.35,theme.neon);
    addLane(x,70,7,.35,0xff334d);
  }

  [
    [-32,-32,20,26,20,theme.building,theme.neon],
    [ 32,-32,20,22,20,theme.building,theme.accent],
    [-32, 32,20,18,20,theme.building,0xffcc00],
    [ 32, 32,20,28,20,theme.building,0xff334d],
    [-108,-32,20,24,20,theme.building,theme.neon],
    [108, 32,20,30,20,theme.building,0xffcc00]
  ].forEach(v => addBuilding(...v));

  [[-18,-10],[18,-12],[-24,18],[24,16],[-10,54],[14,48],[0,-52]].forEach(v => addCover(v[0],v[1],6,2,2));
  addBossDoor(0,78);

  spawnEnemies();
  setMsg(`${theme.name}. ACT near cover or the red tower gate.`);
}

/* ========= ENEMIES ========= */

function spawnEnemies(){
  const count = Math.min(5 + S.level, 20);
  for(let i=0;i<count;i++){
    const type = WARRIORS[Math.floor(Math.random() * WARRIORS.length)];
    const mesh = createWarrior(type, false);
    mesh.position.set(Math.random()*60 - 30, .2, Math.random()*60 - 30);
    scene.add(mesh);
    S.enemies.push({
      mesh,
      type,
      hp: 22 + S.level * 4,
      speed: 0.015 + S.level * 0.0008,
      stride: Math.random() * Math.PI * 2
    });
  }
}

/* ========= BOSS BUILDING ========= */

function enterBossBuilding(){
  clearLevel();
  S.inBoss = true;
  S.inCover = false;
  S.nearCover = null;

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(64,64),
    stdMat(0x111111, .95, .02)
  );
  floor.rotation.x = -Math.PI / 2;
  pushDeco(floor);

  const walls = [
    [64,10,2,0,5,-32],
    [64,10,2,0,5,32],
    [2,10,64,-32,5,0],
    [2,10,64,32,5,0]
  ];
  walls.forEach(([w,h,d,x,y,z])=>{
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), stdMat(0x252525,.88,.03));
    m.position.set(x,y,z);
    pushDeco(m);
  });

  [[-14,-10],[14,-10],[-16,10],[16,10],[0,0],[0,18]].forEach(v=>addCover(v[0],v[1],7,2,2,0x444444));

  const bossType = WARRIORS[1];
  const mesh = createWarrior(bossType, true);
  mesh.position.set(0, .2, -8);
  scene.add(mesh);

  const maxHp = 420 + S.level * 90;
  S.boss = {
    mesh,
    type: bossType,
    hp: maxHp,
    maxHp,
    phase: 1,
    speed: 0.020 + S.level * 0.0007
  };

  bossBarWrap.style.display = "block";
  setMsg(`Boss chamber: ${bossType.name}. Use cover and reload smart.`);
}

/* ========= AUDIO ========= */

let audioCtx = null;
let analyser = null;
let data = null;

uploadInput.onchange = async e => {
  const file = e.target.files[0];
  if(!file) return;

  const audio = new Audio(URL.createObjectURL(file));
  audio.loop = true;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  data = new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);

  await audio.play().catch(()=>{});
  setMsg("Music loaded. Stronger beats increase damage.");
};

function beatPower(){
  if(!analyser) return 1.15;
  analyser.getByteFrequencyData(data);
  const avg = data.reduce((a,b)=>a+b,0) / data.length;
  return avg > 150 ? 2.8 : avg > 115 ? 2.0 : 1.2;
}

/* ========= COMBAT ========= */

function reloadNow(){
  if(S.reloading || S.ammo === S.maxAmmo) return;
  S.reloading = true;
  setMsg("Reloading...");
  setTimeout(()=>{
    S.ammo = S.maxAmmo;
    S.reloading = false;
    setMsg("Reloaded.");
  }, 900);
}

function fire(){
  if(S.reloading) return;
  if(S.ammo <= 0){
    setMsg("Out of ammo.");
    return;
  }

  const now = performance.now();
  if(now - S.lastShot < 170) return;
  S.lastShot = now;
  S.ammo--;

  const ray = new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(0,0), camera);

  if(S.inBoss && S.boss){
    const hit = ray.intersectObject(S.boss.mesh, true);
    if(hit.length){
      S.boss.hp -= 14 * beatPower();
      if(S.boss.hp <= S.boss.maxHp * 0.55 && S.boss.phase === 1){
        S.boss.phase = 2;
        S.boss.speed *= 1.3;
        S.boss.mesh.children[0].material.color.set(0xff6600);
        setMsg("Boss phase 2.");
      }
      if(S.boss.hp <= 0){
        scene.remove(S.boss.mesh);
        S.boss = null;
        S.inBoss = false;
        S.level += 2;
        S.credits += 500;
        bossBarWrap.style.display = "none";
        buildCity();
        setMsg("Boss defeated.");
      }
      return;
    }
  }

  const hit = ray.intersectObjects(S.enemies.map(e=>e.mesh), true);
  if(hit.length){
    const obj = hit[0].object;
    const enemy = S.enemies.find(e => e.mesh === obj.parent || e.mesh.children.includes(obj));
    if(enemy){
      enemy.hp -= 14 * beatPower();
      if(enemy.hp <= 0){
        scene.remove(enemy.mesh);
        S.enemies = S.enemies.filter(x => x !== enemy);
        S.credits += 20;
        if(S.enemies.length === 0){
          S.level++;
          buildCity();
          setMsg("Wave cleared.");
        }
      }
    }
  }
}

function actNow(){
  const now = performance.now();
  if(now - S.lastAct < 500) return;
  S.lastAct = now;

  if(S.inBoss){
    if(S.nearCover){
      S.inCover = !S.inCover;
      setMsg(S.inCover ? "In cover." : "Out of cover.");
    }
    return;
  }

  if(S.bossDoor && Math.hypot(S.x - S.bossDoor.x, S.z - S.bossDoor.z) < 7){
    enterBossBuilding();
    return;
  }

  if(S.nearCover){
    S.inCover = !S.inCover;
    setMsg(S.inCover ? "In cover." : "Out of cover.");
  }
}

/* ========= INPUT ========= */

shoot.onclick = ()=>fire();
reload.onclick = ()=>reloadNow();
act.onclick = ()=>actNow();

let leftTouchId = null;
let rightTouchId = null;
let lastLookX = 0;
let lastLookY = 0;

window.addEventListener("touchstart", e=>{
  for(const t of e.changedTouches){
    if(leftTouchId === null && t.clientX < innerWidth * .42){
      leftTouchId = t.identifier;
    } else if(rightTouchId === null && t.clientX >= innerWidth * .42){
      rightTouchId = t.identifier;
      lastLookX = t.clientX;
      lastLookY = t.clientY;
    }
  }
},{ passive:false });

window.addEventListener("touchmove", e=>{
  e.preventDefault();
  for(const t of e.touches){
    if(t.identifier === leftTouchId){
      const rect = joyBase.getBoundingClientRect();
      let x = t.clientX - rect.left - 64;
      let y = t.clientY - rect.top - 64;
      const d = Math.hypot(x,y);
      if(d > 44){
        x *= 44 / d;
        y *= 44 / d;
      }
      joyStick.style.left = (x + 64 - 25) + "px";
      joyStick.style.top = (y + 64 - 25) + "px";
      S.moveX = x / 44;
      S.moveY = y / 44;
    }
    if(t.identifier === rightTouchId){
      const dx = t.clientX - lastLookX;
      const dy = t.clientY - lastLookY;
      S.yaw -= dx * 0.0045;
      S.pitch = clamp(S.pitch - dy * 0.003, -0.9, 0.9);
      lastLookX = t.clientX;
      lastLookY = t.clientY;
    }
  }
},{ passive:false });

window.addEventListener("touchend", e=>{
  for(const t of e.changedTouches){
    if(t.identifier === leftTouchId){
      leftTouchId = null;
      S.moveX = 0;
      S.moveY = 0;
      joyStick.style.left = "39px";
      joyStick.style.top = "39px";
    }
    if(t.identifier === rightTouchId){
      rightTouchId = null;
    }
  }
},{ passive:false });

/* ========= UPDATE ========= */

function updateCover(){
  S.nearCover = null;
  for(const c of S.covers){
    const d = Math.hypot(S.x - c.mesh.position.x, S.z - c.mesh.position.z);
    if(d < 4.8){
      S.nearCover = c;
      break;
    }
  }
  if(S.inCover && !S.nearCover) S.inCover = false;
}

function updatePlayer(delta){
  const base = S.inCover ? 2.6 : 5.0;
  const speed = base * delta * 8.5;

  const fx = Math.sin(S.yaw);
  const fz = Math.cos(S.yaw);
  const rx = Math.cos(S.yaw);
  const rz = -Math.sin(S.yaw);

  let vx = 0;
  let vz = 0;
  vx += fx * (-S.moveY) * speed;
  vz += fz * (-S.moveY) * speed;
  vx += rx * S.moveX * speed;
  vz += rz * S.moveX * speed;

  S.x += vx;
  S.z += vz;

  if(S.inCover && S.nearCover){
    const c = S.nearCover.mesh.position;
    const dx = S.x - c.x;
    const dz = S.z - c.z;
    const len = Math.hypot(dx,dz) || 1;
    S.x = c.x + (dx / len) * 3.1;
    S.z = c.z + (dz / len) * 3.1;
  }

  camera.position.set(S.x, 2.35, S.z + 0.15);
  camera.rotation.y = S.yaw;
  camera.rotation.x = S.pitch;

  player.position.set(S.x, 0, S.z);
  player.rotation.y = S.yaw + Math.PI;
  animateWarrior(player, performance.now() * 0.01);
}

function updateEnemies(time){
  S.enemies.forEach(e=>{
    const dx = S.x - e.mesh.position.x;
    const dz = S.z - e.mesh.position.z;
    const d = Math.hypot(dx,dz) || 1;
    e.mesh.position.x += (dx / d) * e.speed;
    e.mesh.position.z += (dz / d) * e.speed;
    e.mesh.lookAt(S.x, 1.2, S.z);
    animateWarrior(e.mesh, time * .007 + e.stride);

    if(d < 1.7 && time - S.lastHit > 550){
      S.health -= S.inCover ? 1 : 4;
      S.lastHit = time;
    }
  });
}

function updateBoss(time){
  if(!S.boss) return;
  const b = S.boss.mesh;
  const dx = S.x - b.position.x;
  const dz = S.z - b.position.z;
  const d = Math.hypot(dx,dz) || 1;
  b.position.x += (dx / d) * S.boss.speed;
  b.position.z += (dz / d) * S.boss.speed;
  b.lookAt(S.x, 2, S.z);
  animateWarrior(b, time * .009);

  if(d < 2.3 && time - S.lastHit > 420){
    S.health -= S.inCover ? 2 : (S.boss.phase === 2 ? 8 : 5);
    S.lastHit = time;
  }

  bossBar.style.width = `${Math.max(0, (S.boss.hp / S.boss.maxHp) * 100)}%`;
}

function resetIfDead(){
  if(S.health > 0) return;
  S.health = 100;
  S.ammo = S.maxAmmo;
  S.inCover = false;
  if(S.inBoss){
    buildCity();
    setMsg("You went down. Back outside.");
  } else {
    S.x = 0;
    S.z = 10;
    setMsg("You went down. Reset.");
  }
}

function updateHUD(){
  hud.innerHTML =
    `⚔ ${playerType.name}<br>` +
    `📍 ${themeForLevel(S.level).name}<br>` +
    `LEVEL ${S.level}<br>` +
    `❤️ ${Math.max(0, Math.floor(S.health))}<br>` +
    `🔫 ${S.ammo}/${S.maxAmmo}<br>` +
    `💰 ${S.credits}<br>` +
    `🛡 ${S.inCover ? "COVER" : "EXPOSED"}<br>` +
    `${S.inBoss ? "BOSS CHAMBER" : "CITY"}`
}

buildCity();

let last = performance.now();
function loop(t){
  requestAnimationFrame(loop);
  const delta = Math.min((t - last) / 1000, .03);
  last = t;

  updateCover();
  updatePlayer(delta);
  if(S.inBoss) updateBoss(t); else updateEnemies(t);
  resetIfDead();
  updateHUD();
  renderer.render(scene, camera);
}
loop(performance.now());

window.addEventListener("resize", ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
