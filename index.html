<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch Hub</title>

<style>

:root{
--bg1:#071025;
--bg2:#0c173a;
--card:#111c45;
--text:#ffffff;
--muted:#aab7e8;
--red:#ff2a2a;
--line:rgba(255,255,255,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
background:
radial-gradient(circle at 20% 0%, rgba(255,40,40,.18), transparent 40%),
radial-gradient(circle at 80% 0%, rgba(60,120,255,.18), transparent 40%),
linear-gradient(180deg,var(--bg1),var(--bg2));
}

/* HEADER */

header{
padding:30px;
text-align:center;
font-size:34px;
font-weight:bold;
}

/* HERO */

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
color:var(--muted);
margin-bottom:30px;
}

.hero button{
padding:14px 26px;
border:none;
border-radius:30px;
font-size:16px;
background:var(--red);
color:white;
cursor:pointer;
}

/* LAYOUT */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* CARDS */

.card{
background:var(--card);
padding:20px;
border-radius:14px;
border:1px solid var(--line);
}

/* PLAYER */

audio{
width:100%;
margin-top:15px;
}

/* RADIO */

iframe{
width:100%;
height:120px;
border:none;
margin-top:10px;
}

/* FORM */

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button.submit{
background:var(--red);
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
color:var(--muted);
font-size:14px;
}

</style>

</head>

<body>

<header>
Serious Finch Hub
</header>

<section class="hero">

<h1>Artist Growth Hub</h1>

<p>Submit music • Grow streams • Connect with radio</p>

<button onclick="scrollHub()">Enter Hub</button>

</section>

<div class="container" id="hub">

<div class="grid">

<div class="card">

<h3>Music Player</h3>

<audio id="player" controls></audio>

</div>

<div class="card">

<h3>Top American Radio Stations</h3>

<iframe src="https://live365.com/embed/player/a29138"></iframe>

<iframe src="https://live365.com/embed/player/a30543"></iframe>

<iframe src="https://live365.com/embed/player/a28322"></iframe>

<iframe src="https://live365.com/embed/player/a31265"></iframe>

<iframe src="https://live365.com/embed/player/a29672"></iframe>

<iframe src="https://live365.com/embed/player/a28391"></iframe>

<iframe src="https://live365.com/embed/player/a31206"></iframe>

<iframe src="https://live365.com/embed/player/a30112"></iframe>

<iframe src="https://live365.com/embed/player/a30745"></iframe>

</div>

<div class="card">

<h3>Artist Submission</h3>

<form action="https://formspree.io/f/mjgaajoq" method="POST">

<input type="text" name="artist" placeholder="Artist Name" required>

<input type="text" name="song" placeholder="Song Link" required>

<textarea name="message" placeholder="Message"></textarea>

<button class="submit" type="submit">Submit Music</button>

</form>

</div>

</div>

</div>

<footer>

Serious Finch Hub © 2026

</footer>

<script>

function scrollHub(){
document.getElementById("hub").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
