<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch Artist Growth Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#05070d;
color:white;
}

header{
padding:20px;
text-align:center;
background:#0c173a;
font-size:28px;
font-weight:bold;
}

section{
padding:30px;
max-width:1000px;
margin:auto;
}

.card{
background:#111c45;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

button{
background:#ffd400;
border:none;
padding:12px 18px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

input,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
border-radius:6px;
border:none;
}

audio{
width:100%;
margin-top:10px;
}

.station{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<header>
Serious Finch Artist Growth Hub
</header>

<section>

<div class="card">

<h2>Music Player</h2>

<p id="nowPlaying">Nothing Playing</p>

<audio id="player" controls>
<source id="audioSource" src="">
</audio>

<button onclick="playTrack()">Play Demo Track</button>

</div>


<div class="card">

<h2>Artist Sign-Up</h2>

<form action="https://formspree.io/f/mjgaajoq" method="POST">

<label>Artist Name</label>
<input name="artist" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Music Link</label>
<input name="music" required>

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Submit</button>

</form>

</div>


<div class="card">

<h2>Radio Stations</h2>

<div class="station">
<span>Hot 97 New York</span>
<button onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WQHTFM.mp3')">Play</button>
</div>

<div class="station">
<span>Power 105.1 NYC</span>
<button onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WWPRFM.mp3')">Play</button>
</div>

<div class="station">
<span>Real 92.3 LA</span>
<button onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KRRLFM.mp3')">Play</button>
</div>

<div class="station">
<span>V103 Atlanta</span>
<button onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WVEEFM.mp3')">Play</button>
</div>

<div class="station">
<span>Chicago 107.5 WGCI</span>
<button onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WGCIFM.mp3')">Play</button>
</div>

</div>


<div class="card">

<h2>Site Analytics</h2>

<p>Visits: <span id="visits">0</span></p>
<p>Music Plays: <span id="plays">0</span></p>
<p>Radio Plays: <span id="radioPlays">0</span></p>

</div>

</section>


<script>

const demoTrack="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

let visits = parseInt(localStorage.getItem("visits") || "0")
visits++
localStorage.setItem("visits", visits)
document.getElementById("visits").innerText = visits

let plays = parseInt(localStorage.getItem("plays") || "0")
let radioPlays = parseInt(localStorage.getItem("radio") || "0")

document.getElementById("plays").innerText = plays
document.getElementById("radioPlays").innerText = radioPlays


function playTrack(){

document.getElementById("audioSource").src = demoTrack
document.getElementById("player").load()
document.getElementById("player").play()

plays++
localStorage.setItem("plays",plays)

document.getElementById("plays").innerText = plays
document.getElementById("nowPlaying").innerText="Playing Demo Track"

}


function playRadio(stream){

document.getElementById("audioSource").src = stream
document.getElementById("player").load()
document.getElementById("player").play()

radioPlays++
localStorage.setItem("radio",radioPlays)

document.getElementById("radioPlays").innerText = radioPlays
document.getElementById("nowPlaying").innerText="Playing Radio"

}

</script>

</body>
</html>
