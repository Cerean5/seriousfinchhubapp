<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Neon Open World</title>

<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
canvas{display:block}

#hud{
position:fixed;top:10px;left:10px;
background:rgba(0,0,0,.6);
padding:10px;border-radius:10px;
z-index:10
}

.btn{
position:fixed;border-radius:50%;
padding:16px;font-weight:bold;z-index:10
}
#shoot{right:20px;bottom:20px;background:red}
#act{right:100px;bottom:20px;background:yellow;color:#000}
#reload{right:20px;bottom:100px;background:#ccc;color:#000}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="hud"></div>

<button id="shoot" class="btn">FIRE</button>
<button id="act" class="btn">ACT</button>
<button id="reload" class="btn">R</button>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ========= ENGINE ========= */

const renderer=new THREE.WebGLRenderer({canvas:game,antialias:true});
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x000000,20,200);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
scene.add(new THREE.HemisphereLight(0xffffff,0x222233,1.2));

/* ========= STATE ========= */

let S={
x:0,z:10,yaw:0,
health:100,
ammo:12,maxAmmo:12,
reloading:false,
money:0,
level:1,
wanted:0,
inCar:false,
carSpeed:0,
enemies:[],
police:[],
npc:[],
boss:null,
mission:"pickup"
};

/* ========= PLAYER ========= */

let player=new THREE.Mesh(
new THREE.CapsuleGeometry(.4,1,8,16),
new THREE.MeshStandardMaterial({color:0x00e5ff,emissive:0x00e5ff})
);
scene.add(player);

/* ========= WORLD ========= */

function build(){

scene.clear();
scene.add(player);

S.enemies=[];
S.police=[];
S.npc=[];
S.boss=null;

/* ground */
let g=new THREE.Mesh(
new THREE.PlaneGeometry(400,400),
new THREE.MeshStandardMaterial({color:0x111})
);
g.rotation.x=-Math.PI/2;
scene.add(g);

/* roads */
let road=new THREE.Mesh(
new THREE.PlaneGeometry(20,400),
new THREE.MeshStandardMaterial({color:0x222})
);
road.rotation.x=-Math.PI/2;
scene.add(road);

let cross=new THREE.Mesh(
new THREE.PlaneGeometry(400,20),
new THREE.MeshStandardMaterial({color:0x222})
);
cross.rotation.x=-Math.PI/2;
scene.add(cross);

/* buildings */
for(let i=0;i<80;i++){
let h=10+Math.random()*40;

let b=new THREE.Mesh(
new THREE.BoxGeometry(6,h,6),
new THREE.MeshStandardMaterial({color:0x333})
);
b.position.set(Math.random()*200-100,h/2,Math.random()*200-100);
scene.add(b);
}

/* car */
let car=new THREE.Mesh(
new THREE.BoxGeometry(3,1,5),
new THREE.MeshStandardMaterial({color:0x00ffcc})
);
car.position.set(5,1,5);
scene.add(car);
S.car=car;

/* NPCs */
for(let i=0;i<10;i++){
let n=new THREE.Mesh(
new THREE.CapsuleGeometry(.3,.8,8,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
n.position.set(Math.random()*50-25,1,Math.random()*50-25);
scene.add(n);
S.npc.push(n);
}

/* enemies */
for(let i=0;i<5+S.level;i++){
spawnEnemy();
}

/* boss every 3 levels */
if(S.level%3===0){
let b=new THREE.Mesh(
new THREE.CapsuleGeometry(1,3,8,16),
new THREE.MeshStandardMaterial({color:0xff0000})
);
b.position.set(0,2,0);
scene.add(b);

S.boss={mesh:b,hp:200+S.level*50,phase:1};
}
}

/* ========= SPAWN ========= */

function spawnEnemy(){
let e=new THREE.Mesh(
new THREE.CapsuleGeometry(.4,1,8,16),
new THREE.MeshStandardMaterial({color:0xff3333})
);
e.position.set(Math.random()*40-20,1,Math.random()*40-20);
scene.add(e);

S.enemies.push({mesh:e,hp:30+S.level*5});
}

/* ========= SHOOT ========= */

shoot.onclick=()=>{

if(S.ammo<=0||S.reloading)return;
S.ammo--;

let ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);

/* boss */
if(S.boss){
let hit=ray.intersectObject(S.boss.mesh);
if(hit.length){
S.boss.hp-=15;

if(S.boss.hp<100)S.boss.phase=2;

if(S.boss.hp<=0){
scene.remove(S.boss.mesh);
S.money+=200;
S.level++;
build();
}
return;
}
}

/* enemies */
let hit=ray.intersectObjects(S.enemies.map(e=>e.mesh));
if(hit.length){
let e=S.enemies.find(x=>x.mesh===hit[0].object);
e.hp-=15;
S.wanted++;

if(e.hp<=0){
scene.remove(e.mesh);
S.enemies=S.enemies.filter(x=>x!==e);
S.money+=20;
}
}
};

/* ========= ACT ========= */

act.onclick=()=>{

let d=Math.hypot(S.x-S.car.position.x,S.z-S.car.position.z);

if(d<5){
S.inCar=!S.inCar;
}
};

/* ========= RELOAD ========= */

reload.onclick=()=>{
if(S.reloading)return;
S.reloading=true;
setTimeout(()=>{
S.ammo=S.maxAmmo;
S.reloading=false;
},1000);
};

/* ========= MOVE ========= */

window.addEventListener("touchmove",e=>{
let t=e.touches[0];

if(S.inCar){
S.car.position.x+=(t.clientX-innerWidth/2)/200;
S.car.position.z+=(t.clientY-innerHeight/2)/200;
S.x=S.car.position.x;
S.z=S.car.position.z;
}else{
S.x+=(t.clientX-innerWidth/2)/300;
S.z+=(t.clientY-innerHeight/2)/300;
}
});

/* ========= LOOP ========= */

function loop(){
requestAnimationFrame(loop);

camera.position.set(S.x,5,S.z+12);
camera.lookAt(S.x,1,S.z);

player.position.set(S.x,1,S.z);

/* NPC wander */
S.npc.forEach(n=>{
n.position.x+=Math.sin(Date.now()/1000)*0.01;
});

/* enemies */
S.enemies.forEach(e=>{
let dx=S.x-e.mesh.position.x;
let dz=S.z-e.mesh.position.z;
let d=Math.hypot(dx,dz);

e.mesh.position.x+=dx/d*0.03;
e.mesh.position.z+=dz/d*0.03;

if(d<2){
S.health-=0.2;
}
});

/* police spawn */
if(S.wanted>3 && S.police.length<3){
let p=new THREE.Mesh(
new THREE.CapsuleGeometry(.4,1,8,16),
new THREE.MeshStandardMaterial({color:0x00aaff})
);
p.position.set(S.x+10,1,S.z-10);
scene.add(p);
S.police.push(p);
}

/* police chase */
S.police.forEach(p=>{
let dx=S.x-p.position.x;
let dz=S.z-p.position.z;
let d=Math.hypot(dx,dz);

p.position.x+=dx/d*0.04;
p.position.z+=dz/d*0.04;

if(d<2){
S.health-=0.5;
}
});

/* HUD */
hud.innerHTML=
"HP:"+Math.floor(S.health)+
"<br>Ammo:"+S.ammo+
"<br>Money:"+S.money+
"<br>Level:"+S.level+
"<br>Wanted:"+S.wanted;

/* death */
if(S.health<=0){
S.health=100;
S.money=0;
S.level=1;
build();
}

renderer.render(scene,camera);
}

build();
loop();
</script>

</body>
</html>
