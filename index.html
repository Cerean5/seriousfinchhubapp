<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serious Finch Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* Background glow */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 10%,rgba(255,0,0,.4),transparent 40%),
radial-gradient(circle at 80% 20%,rgba(0,150,255,.4),transparent 40%);
z-index:-1;
}

/* Title */

h1{
font-size:48px;
margin-top:40px;
letter-spacing:2px;
}

/* subtitle */

.subtitle{
color:#ccc;
margin-bottom:30px;
font-size:20px;
}

/* buttons */

.button{
display:block;
width:280px;
margin:15px auto;
padding:15px;
background:#ffd000;
color:black;
font-size:22px;
text-decoration:none;
border-radius:10px;
transition:.3s;
}

.button:hover{
background:white;
}

/* music player */

.player{
margin-top:40px;
}

audio{
width:90%;
max-width:500px;
}

/* section titles */

.section{
margin-top:50px;
font-size:26px;
}

/* artist submit */

input{
padding:12px;
width:70%;
max-width:400px;
border-radius:8px;
border:none;
margin-top:10px;
}

.submit{
background:#00ff88;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:18px;
}

</style>
</head>

<body>

<h1>SERIOUS FINCH</h1>

<div class="subtitle">Official Music Hub</div>

<a class="button" href="https://serious-finch-hub.replit.app">
Main Hub
</a>

<a class="button" href="https://youtube.com">
YouTube Channel
</a>

<a class="button" href="#">
Nature Finch
</a>

<a class="button" href="#">
Canelilive
</a>


<div class="section">
Music Player
</div>

<div class="player">

<audio controls>

<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">

</audio>

</div>


<div class="section">
Top Radio Stations
</div>

<a class="button" href="https://www.iheart.com/live/z100-new-york-1469/">
Z100 New York
</a>

<a class="button" href="https://www.iheart.com/live/power-1051-2097/">
Power 105.1
</a>

<a class="button" href="https://www.iheart.com/live/hot-97-2505/">
Hot 97
</a>


<div class="section">
Artist Music Submission
</div>

<input placeholder="Paste Spotify / YouTube link">

<br>

<button class="submit">
Submit
</button>


<div class="section">
Artist Growth Hub
</div>

<a class="button" href="https://serious-finch-hub.replit.app">
Open Growth Hub
</a>


</body>
</html>
