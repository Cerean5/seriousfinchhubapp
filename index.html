<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch Hub</title>

<style>

:root{
--bg1:#071025;
--bg2:#0c173a;
--card:#111c45;
--text:#ffffff;
--muted:#aab7e8;
--red:#ff2a2a;
--line:rgba(255,255,255,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
background:
radial-gradient(circle at 20% 0%, rgba(255,40,40,.18), transparent 40%),
radial-gradient(circle at 80% 0%, rgba(60,120,255,.18), transparent 40%),
linear-gradient(180deg,var(--bg1),var(--bg2));
}

header{
padding:30px;
text-align:center;
font-size:34px;
font-weight:bold;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
color:var(--muted);
margin-bottom:30px;
}

.hero button{
padding:14px 26px;
border:none;
border-radius:30px;
font-size:16px;
background:var(--red);
color:white;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
border:1px solid var(--line);
}

audio{
width:100%;
margin-top:15px;
}

.radio-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:15px;
}

.radio{
background:#2f45ff;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:30px;
color:var(--muted);
font-size:14px;
}

</style>

</head>

<body>

<header>
Serious Finch Hub
</header>

<section class="hero">

<h1>Artist Growth Hub</h1>

<p>Submit music • Grow streams • Connect with radio</p>

<button onclick="scrollHub()">Enter Hub</button>

</section>

<div class="container" id="hub">

<div class="grid">

<div class="card">

<h3>Radio Player</h3>

<audio id="player" controls></audio>

</div>

<div class="card">

<h3>Top American Radio Stations</h3>

<div class="radio-grid">

<div class="radio" onclick="playRadio('https://stream.revma.ihrhls.com/zc1465')">Z100</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KIISFMAAC.aac')">KIIS FM</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WQHTFMAAC.aac')">HOT 97</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KPWRFMAAC.aac')">Power 106</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WWPRFMAAC.aac')">Power 105.1</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WBLSFMAAC.aac')">WBLS</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/WGCIAMAAC.aac')">WGCI</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KDAYFMAAC.aac')">93.5 KDAY</div>

<div class="radio" onclick="playRadio('https://playerservices.streamtheworld.com/api/livestream-redirect/KRBQFMAAC.aac')">Q102</div>

</div>

</div>

</div>

</div>

<footer>
Serious Finch Hub © 2026
</footer>

<script>

const player=document.getElementById("player")

function playRadio(url){
player.src=url
player.play()
}

function scrollHub(){
document.getElementById("hub").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
