<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sons of Gunsmoke: Neon Warfare</title>

<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
canvas{display:block}

#hud,#msg{
position:fixed;background:rgba(0,0,0,.7);
padding:10px;border-radius:10px;z-index:10
}
#hud{top:10px;left:10px}
#msg{top:10px;left:50%;transform:translateX(-50%)}

#crosshair{
position:fixed;left:50%;top:50%;
width:20px;height:20px;transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
content:"";position:absolute;background:#fff;
}
#crosshair:before{width:2px;height:20px;left:9px}
#crosshair:after{width:20px;height:2px;top:9px}

.btn{
position:fixed;border-radius:50%;
padding:18px;font-weight:bold
}
#shoot{right:20px;bottom:20px;background:red}
#act{right:100px;bottom:20px;background:yellow;color:#000}

#upload{position:fixed;top:10px;right:10px}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="hud"></div>
<div id="msg">Explore • Fight • Take Cover • Enter Buildings</div>
<div id="crosshair"></div>

<button id="shoot" class="btn">FIRE</button>
<button id="act" class="btn">ACT</button>
<input type="file" id="upload" accept="audio/*">

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ========= STATE ========= */

let state={
level:1,
health:100,
credits:0,
playerX:0,
playerZ:10,
enemies:[],
zones:[],
covers:[],
boss:null,
bossMode:false,
inHome:false,
inCover:false,
beat:1
};

/* ========= SCENE ========= */

const renderer=new THREE.WebGLRenderer({canvas:game});
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x05070d,20,200);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);

scene.add(new THREE.HemisphereLight(0xffffff,0x222233,1.2));

/* ========= CITY ========= */

function buildCity(){

scene.clear();
state.zones=[];
state.covers=[];

/* GROUND */
let g=new THREE.Mesh(
new THREE.PlaneGeometry(300,300),
new THREE.MeshStandardMaterial({color:0x0a0a0f})
);
g.rotation.x=-Math.PI/2;
scene.add(g);

/* BUILDINGS */
for(let i=0;i<120;i++){
let h=Math.random()*40+10;
let b=new THREE.Mesh(
new THREE.BoxGeometry(4,h,4),
new THREE.MeshStandardMaterial({
color:0x111122,
emissive:Math.random()>0.7?0x00e5ff:0
})
);
b.position.set(Math.random()*200-100,h/2,Math.random()*200-100);
scene.add(b);
}

/* COVER OBJECTS */
for(let i=0;i<20;i++){
let c=new THREE.Mesh(
new THREE.BoxGeometry(6,2,2),
new THREE.MeshStandardMaterial({color:0x333333})
);
c.position.set(Math.random()*100-50,1,Math.random()*100-50);
scene.add(c);
state.covers.push(c);
}

/* ZONES */
zone("HOME",-40,-40,0x00ff99);
zone("CLUB",40,-40,0xff00ff);
zone("STUDIO",-40,40,0x00e5ff);
zone("RADIO",40,40,0xffcc00);
zone("BOSS",0,80,0xff0000);

spawn();
}

/* ========= ZONES ========= */

function zone(name,x,z,color){
let m=new THREE.Mesh(
new THREE.CylinderGeometry(6,6,.3,20),
new THREE.MeshBasicMaterial({color,transparent:true,opacity:.6})
);
m.rotation.x=-Math.PI/2;
m.position.set(x,.2,z);
scene.add(m);

state.zones.push({name,x,z});
}

/* ========= PLAYER ========= */

const player=new THREE.Mesh(
new THREE.CapsuleGeometry(.4,1,4,8),
new THREE.MeshStandardMaterial({color:0x00e5ff})
);
scene.add(player);

/* ========= ENEMIES ========= */

function spawn(){
state.enemies.forEach(e=>scene.remove(e));
state.enemies=[];

for(let i=0;i<5+state.level;i++){
let e=new THREE.Mesh(
new THREE.CapsuleGeometry(.4,1,4,8),
new THREE.MeshStandardMaterial({color:0xff3333})
);
e.position.set(Math.random()*60-30,1,Math.random()*60-30);
scene.add(e);
state.enemies.push(e);
}
}

/* ========= COVER SYSTEM ========= */

function checkCover(){
state.inCover=false;

for(let c of state.covers){
if(Math.hypot(state.playerX-c.position.x,state.playerZ-c.position.z)<4){
state.inCover=true;
}
}
}

/* ========= BOSS ========= */

function enterBoss(){
state.bossMode=true;
scene.clear();

let floor=new THREE.Mesh(
new THREE.PlaneGeometry(60,60),
new THREE.MeshStandardMaterial({color:0x111})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* COVER INSIDE */
for(let i=0;i<8;i++){
let c=new THREE.Mesh(
new THREE.BoxGeometry(6,2,2),
new THREE.MeshStandardMaterial({color:0x333})
);
c.position.set(Math.random()*40-20,1,Math.random()*40-20);
scene.add(c);
state.covers.push(c);
}

/* BOSS */
let boss=new THREE.Mesh(
new THREE.CapsuleGeometry(1.5,3,8,16),
new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000})
);
boss.position.set(0,2,0);
scene.add(boss);

state.boss={mesh:boss,health:300+state.level*100,phase:1};
}

/* ========= MUSIC ========= */

let analyser,data,ctx;

upload.onchange=async e=>{
let file=e.target.files[0];
let audio=new Audio(URL.createObjectURL(file));
audio.loop=true;

ctx=new AudioContext();
let src=ctx.createMediaElementSource(audio);
analyser=ctx.createAnalyser();
data=new Uint8Array(analyser.frequencyBinCount);

src.connect(analyser);
analyser.connect(ctx.destination);
audio.play();
};

function beatPower(){
if(!analyser)return 1;
analyser.getByteFrequencyData(data);
let avg=data.reduce((a,b)=>a+b)/data.length;
return avg>120?2:1.2;
}

/* ========= ACT ========= */

act.onclick=()=>{
for(let z of state.zones){
if(Math.hypot(state.playerX-z.x,state.playerZ-z.z)<6){

if(z.name==="HOME"){state.health=100;msg.innerText="Resting"}
if(z.name==="CLUB"){state.level++;spawn()}
if(z.name==="STUDIO"){state.credits+=50}
if(z.name==="RADIO"){state.level++;state.credits+=100;spawn()}
if(z.name==="BOSS"){enterBoss()}

}
}
};

/* ========= SHOOT ========= */

shoot.onclick=()=>{

if(state.bossMode){
let ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);
let hit=ray.intersectObject(state.boss.mesh);

if(hit.length){
state.boss.health-=10*beatPower();

if(state.boss.health<150){
state.boss.phase=2;
state.boss.mesh.material.color.set(0xff6600);
}

if(state.boss.health<=0){
scene.remove(state.boss.mesh);
state.bossMode=false;
state.level+=2;
state.credits+=500;
buildCity();
}
return;
}
}

/* NORMAL ENEMIES */
let ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);
let hit=ray.intersectObjects(state.enemies);

if(hit.length){
scene.remove(hit[0].object);
state.enemies=state.enemies.filter(x=>x!==hit[0].object);

if(state.enemies.length===0){
state.level++;
spawn();
}
}
};

/* ========= MOVE ========= */

window.addEventListener("touchmove",e=>{
let t=e.touches[0];
state.playerX+=(t.clientX-innerWidth/2)/300;
state.playerZ+=(t.clientY-innerHeight/2)/300;
});

/* ========= LOOP ========= */

buildCity();

function animate(){
requestAnimationFrame(animate);

/* COVER */
checkCover();

/* PLAYER */
camera.position.set(state.playerX,2,state.playerZ+8);
player.position.set(state.playerX,1,state.playerZ);

/* ENEMIES */
state.enemies.forEach(e=>{
let dx=state.playerX-e.position.x;
let dz=state.playerZ-e.position.z;
let d=Math.hypot(dx,dz);
e.position.x+=dx/d*0.03;
e.position.z+=dz/d*0.03;
});

/* BOSS */
if(state.bossMode && state.boss){
let b=state.boss.mesh;
let dx=state.playerX-b.position.x;
let dz=state.playerZ-b.position.z;
let d=Math.hypot(dx,dz);

b.position.x+=dx/d*0.05;
b.position.z+=dz/d*0.05;

if(d<2){
state.health-=state.inCover?1:3;
}
}

/* HUD */
hud.innerHTML=
"Level: "+state.level+
"<br>Health: "+state.health+
"<br>Credits: "+state.credits+
"<br>Cover: "+(state.inCover?"YES":"NO");

renderer.render(scene,camera);
}

animate();

window.onresize=()=>{
renderer.setSize(innerWidth,innerHeight);
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
};
</script>

</body>
</html>
