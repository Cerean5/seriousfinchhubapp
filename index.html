<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;
  height:320px;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.6);
}

.overlay{
  position:absolute;
  bottom:20px;
  left:20px;
  background:rgba(0,0,0,.6);
  padding:12px 16px;
  border-radius:12px;
}

.overlay h1{margin:0;font-size:26px}
.overlay p{margin:0;color:#ccc}

/* BUTTONS */
.buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:15px;
}

button{
  margin:5px;
  padding:12px 18px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.primary{background:#ff2d55;color:#fff}
.secondary{background:#111;color:#fff;border:1px solid #333}
.gold{background:#d4af37;color:#000}

/* SECTION */
.section{padding:20px}
.card{
  background:#0a0a0a;
  border-radius:16px;
  padding:15px;
  margin:15px auto;
  max-width:850px;
  border:1px solid #222;
}

iframe{
  width:100%;
  border-radius:14px;
  border:1px solid #222;
}

/* LIVE */
#live{
  text-align:center;
  color:#ff2d55;
  margin-top:5px;
}

/* GALLERY */
.gallery img{
  width:100%;
  max-width:850px;
  margin:10px auto;
  display:block;
  border-radius:14px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
  <div class="overlay">
    <h1>WHERE THE SAUCE AT?</h1>
    <p>Serious Finch • Sons of Gunsmoke</p>
  </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
  <button class="primary" data-go="youtube">▶ Play</button>
  <button class="secondary" data-go="spotify">Spotify</button>
  <button class="secondary" data-go="apple">Apple</button>
  <button class="gold" data-go="tidal">TIDAL</button>
  <button class="secondary" data-go="instagram">Instagram</button>
  <button class="secondary" data-go="facebook">Facebook</button>
</div>

<div id="live">🔥 153 tapped in</div>

<!-- VIDEO -->
<div class="section">
  <div class="card">
    <iframe height="300"
    src="https://www.youtube.com/embed/L6qnsBgi2ZQ?autoplay=1&mute=1"></iframe>
  </div>
</div>

<!-- STREAMING -->
<div class="section">

  <div class="card">
    <iframe height="152"
    src="https://open.spotify.com/embed/track/7zEJAr3odmPEhBiywgqafV"></iframe>
  </div>

  <div class="card">
    <iframe height="175"
    src="https://embed.music.apple.com/us/song/no-contact-feat-serious-finch/1854184106"></iframe>
  </div>

  <div class="card">
    <iframe height="300"
    src="https://www.youtube.com/embed/videoseries?list=OLAK5uy_lceL2Dg6t59lhNr_QI6BQwKUWVhOrl_L0"></iframe>
  </div>

</div>

<!-- VISUAL SECTION -->
<div class="section gallery">

<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
<img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">

</div>

<script>

/* 🔥 HIDDEN GOD MODE ENGINE */
const LINKS={
spotify:"https://open.spotify.com/track/7zEJAr3odmPEhBiywgqafV",
apple:"https://music.apple.com/us/song/no-contact-feat-serious-finch/1854184106",
tidal:"https://tidal.com/artist/19525593",
youtube:"https://youtube.com/watch?v=L6qnsBgi2ZQ",
instagram:"https://www.instagram.com/serious_finch",
facebook:"https://www.facebook.com/share/1L3xM3P1y7/"
};

function go(p){
let u=new URL(LINKS[p]);
u.searchParams.set("utm_source","empire");
u.searchParams.set("utm_campaign","finch");
window.open(u,"_blank");
}

document.querySelectorAll("[data-go]").forEach(b=>{
b.onclick=()=>go(b.getAttribute("data-go"));
});

/* LIVE COUNTER */
let c=153;
setInterval(()=>{
c+=Math.random()>0.5?1:0;
document.getElementById("live").innerText="🔥 "+c+" tapped in";
},4000);

</script>

</body>
</html>
