<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WHY SO SERIOUS — Serious Finch × Sons of Gunsmoke</title>

<meta name="description" content="Serious Finch × Sons of Gunsmoke. Official release.">
<meta property="og:title" content="WHY SO SERIOUS">
<meta property="og:image" content="/seriousfinchhubapp/image-hero-1.jpg">
<meta property="og:type" content="website">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:brightness(.55);
  transition:opacity 1.5s ease;
  opacity:0;
}

.active{opacity:1;}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.1));
}

.hero-content{
  position:relative;
  z-index:2;
  padding:0 20px;
}

.hero h1{
  font-size:4rem;
  letter-spacing:10px;
}

.hero p{
  color:#aaa;
}

button{
  margin:10px;
  padding:16px 32px;
  border-radius:40px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.primary{
  background:#ff2d55;
  color:#fff;
}

.secondary{
  background:#111;
  color:#fff;
  border:1px solid #333;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

iframe{
  width:100%;
  max-width:800px;
  height:400px;
  border:none;
  border-radius:16px;
  margin-top:30px;
}

/* VISUALS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:40px;
}

.grid img{
  width:100%;
  border-radius:16px;
}

footer{
  text-align:center;
  padding:40px;
  color:#444;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div id="s1" class="slide active"></div>
<div id="s2" class="slide"></div>
<div id="s3" class="slide"></div>
<div class="overlay"></div>

<div class="hero-content">
<h1>WHY SO SERIOUS</h1>
<p>Serious Finch × Sons of Gunsmoke</p>

<button class="primary" onclick="go('spotify')">STREAM</button>
<button class="secondary" onclick="go('youtube')">WATCH</button>
</div>
</div>

<!-- VIDEO -->
<div class="section">
<h2>VIDEO</h2>
<iframe src="https://www.youtube.com/embed/L6qnsBgi2ZQ"></iframe>
</div>

<!-- LISTEN -->
<div class="section">
<h2>LISTEN</h2>
<iframe src="https://open.spotify.com/embed/track/7zEJAr3odmPEhBiywgqafV"></iframe>
</div>

<!-- VISUALS -->
<div class="section">
<h2>VISUALS</h2>

<div class="grid">
<img src="/seriousfinchhubapp/image-hero-1.jpg">
<img src="/seriousfinchhubapp/image-hero-2.jpg">
<img src="/seriousfinchhubapp/image-hero-3.jpg">
</div>

</div>

<footer>
© Serious Finch × Sons of Gunsmoke
</footer>

<script>
const IMAGES=[
"/seriousfinchhubapp/image-hero-1.jpg",
"/seriousfinchhubapp/image-hero-2.jpg",
"/seriousfinchhubapp/image-hero-3.jpg"
];

let slides=[s1,s2,s3];
let i=0;

slides.forEach((el,index)=>{
el.style.backgroundImage=`url(${IMAGES[index]})`;
});

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%3;
slides[i].classList.add("active");
},5000);

const LINKS={
spotify:"https://open.spotify.com/track/7zEJAr3odmPEhBiywgqafV",
youtube:"https://youtube.com/watch?v=L6qnsBgi2ZQ"
};

function go(p){
window.open(LINKS[p],"_blank");
}
</script>

</body>
</html>
