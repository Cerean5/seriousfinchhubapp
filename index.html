<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sons of Gunsmoke: Neon City</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial;color:#fff}
canvas{display:block}

#hud{
position:fixed;top:10px;left:10px;
background:rgba(0,0,0,.6);
padding:10px;border-radius:10px;
font-size:14px;z-index:10;
}

#crosshair{
position:fixed;left:50%;top:50%;
width:20px;height:20px;
transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
content:"";position:absolute;background:#fff;
}
#crosshair:before{width:2px;height:20px;left:9px}
#crosshair:after{width:20px;height:2px;top:9px}

#btn{
position:fixed;bottom:30px;right:30px;
background:red;padding:20px;
border-radius:50%;font-weight:bold;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="hud">Loading...</div>
<div id="crosshair"></div>
<div id="btn">FIRE</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ========= GAME STATE ========= */

const state = {
level:1,
health:100,
enemies:[],
playerX:0,
playerZ:10,
yaw:0,
moveX:0,
moveY:0
};

/* ========= SCENE ========= */

const canvas = document.getElementById("game");
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070d);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
camera.position.set(0,2,8);

/* ========= LIGHT ========= */

const light = new THREE.HemisphereLight(0xffffff,0x222233,1.2);
scene.add(light);

/* ========= CITY ========= */

function buildCity(){
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

for(let i=0;i<40;i++){
const b = new THREE.Mesh(
new THREE.BoxGeometry(4,Math.random()*20+10,4),
new THREE.MeshStandardMaterial({color:0x222244})
);
b.position.set(
(Math.random()*100)-50,
b.geometry.parameters.height/2,
(Math.random()*100)-50
);
scene.add(b);
}
}
buildCity();

/* ========= PLAYER ========= */

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x00e5ff})
);
scene.add(player);

/* ========= ENEMIES ========= */

function spawnEnemies(){
state.enemies.forEach(e=>scene.remove(e));
state.enemies=[];

for(let i=0;i<5+state.level;i++){
const e = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff3333})
);
e.position.set(
(Math.random()*40)-20,
1,
(Math.random()*40)-20
);
scene.add(e);
state.enemies.push(e);
}
}
spawnEnemies();

/* ========= CONTROLS ========= */

window.addEventListener("touchmove",(e)=>{
const t=e.touches[0];
state.moveX=(t.clientX-innerWidth/2)/200;
state.moveY=(t.clientY-innerHeight/2)/200;
});

document.getElementById("btn").onclick=shoot;

/* ========= SHOOT ========= */

function shoot(){
const ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);
const hit=ray.intersectObjects(state.enemies);

if(hit.length){
scene.remove(hit[0].object);
state.enemies=state.enemies.filter(x=>x!==hit[0].object);

if(state.enemies.length===0){
state.level++;
spawnEnemies();
}
}
}

/* ========= LOOP ========= */

function animate(){
requestAnimationFrame(animate);

state.playerX += state.moveX;
state.playerZ += state.moveY;

camera.position.set(state.playerX,2,state.playerZ+8);
player.position.set(state.playerX,1,state.playerZ);

state.enemies.forEach(e=>{
const dx=state.playerX-e.position.x;
const dz=state.playerZ-e.position.z;
const d=Math.hypot(dx,dz);
e.position.x+=dx/d*0.02;
e.position.z+=dz/d*0.02;
});

document.getElementById("hud").innerHTML=
"Level: "+state.level+
"<br>Enemies: "+state.enemies.length;

renderer.render(scene,camera);
}
animate();

/* ========= RESIZE ========= */

window.addEventListener("resize",()=>{
renderer.setSize(innerWidth,innerHeight);
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
});
</script>

</body>
</html>
