<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch | WHY SO SERIOUS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* VIDEO */
.hero-video-wrap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:-5;
overflow:hidden;
}
.hero-video-wrap iframe{
position:absolute;
top:50%;
left:50%;
width:177.77vh;
height:56.25vw;
min-width:100%;
min-height:100%;
transform:translate(-50%,-50%);
pointer-events:none;
filter:brightness(.45) contrast(1.3);
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* TEXT */
h1{
font-size:70px;
text-shadow:0 0 40px red;
margin:0;
}
.sub{opacity:.8}

/* BUTTONS */
.btn{
padding:15px 35px;
border:none;
border-radius:50px;
margin:10px;
font-size:18px;
cursor:pointer;
}
.red{background:red;color:#fff;}
.gold{background:gold;color:#000;}
.dark{background:#222;color:#fff;}

/* FLOAT CTA */
#cta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:12px 30px;
border-radius:40px;
cursor:pointer;
box-shadow:0 0 20px red;
}

/* FLASH EFFECT */
.flash{
animation:flash 0.3s;
}
@keyframes flash{
0%{background:#000;}
50%{background:#111;}
100%{background:#000;}
}
</style>
</head>

<body>

<!-- VIDEO -->
<div class="hero-video-wrap">
<iframe
src="https://www.youtube.com/embed/xTj7TFiVc0g?autoplay=1&mute=1&controls=0&loop=1&playlist=xTj7TFiVc0g&playsinline=1"
allow="autoplay; encrypted-media"
frameborder="0">
</iframe>
</div>

<!-- HERO -->
<div class="hero">
<h1 id="title">WHY SO SERIOUS?</h1>
<div class="sub" id="subtext">Serious Finch • OUT NOW</div>

<button class="btn red" onclick="goSmart()">STREAM NOW</button>
<button class="btn dark" onclick="go('tidal')">TIDAL</button>
<button class="btn gold" onclick="share()">SHARE</button>

<iframe style="margin-top:20px;border-radius:12px"
src="https://open.spotify.com/embed/track/5YEBWTiJxIsqNA15LIKk4B"
width="300" height="80"
frameBorder="0">
</iframe>

</div>

<div id="cta" onclick="goSmart()">TAP IN</div>

<script>

// LINKS
const L={
spotify:"https://open.spotify.com/track/5YEBWTiJxIsqNA15LIKk4B",
tidal:"https://tidal.com/track/249962630/u"
};

// STATE
let S=JSON.parse(localStorage.getItem("sf_god"))||{
visits:0,
clicks:0,
spotify:0,
tidal:0
};

S.visits++;

// SMART PLATFORM (REAL LOGIC)
function bestPlatform(){
if(S.spotify < 5) return "spotify";
if(S.tidal < 3 && S.visits > 2) return "tidal";
return "spotify";
}

// CLICK
function go(p){
S.clicks++;
S[p]++;
save();
window.open(L[p],"_blank");
}

// SMART PUSH
function goSmart(){
let p=bestPlatform();
go(p);
flash();
}

// SAVE
function save(){
localStorage.setItem("sf_god",JSON.stringify(S));
}

// FLASH FX
function flash(){
document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),300);
}

// DYNAMIC TEXT (RETARGET FEEL)
function updateText(){
if(S.visits===1){
document.getElementById("subtext").innerText="First time here. Tap in.";
}
if(S.visits>2){
document.getElementById("subtext").innerText="You back. Run it up.";
}
if(S.visits>5){
document.getElementById("subtext").innerText="Stop playing. Stream it.";
}
}

// AUTO PUSH (LIKE ADS)
setTimeout(()=>{
goSmart();
},7000);

// INIT
updateText();
save();

</script>

</body>
</html>
