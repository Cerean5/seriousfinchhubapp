<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Neon City Ultra</title>

<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ========= RENDER ========= */

const renderer = new THREE.WebGLRenderer({
  canvas: game,
  antialias: true
});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;

/* ========= SCENE ========= */

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x05070f, 20, 220);

/* ========= CAMERA ========= */

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth/innerHeight,
  0.1,
  1000
);

/* ========= SKY ========= */

const skyGeo = new THREE.SphereGeometry(500,32,32);
const skyMat = new THREE.MeshBasicMaterial({
  color:0x0a0f1f,
  side:THREE.BackSide
});
const sky = new THREE.Mesh(skyGeo,skyMat);
scene.add(sky);

/* ========= LIGHTING ========= */

// ambient
scene.add(new THREE.AmbientLight(0x404060,1.4));

// sun
const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(30,50,20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
scene.add(sun);

// neon glow lights
for(let i=0;i<6;i++){
  const light = new THREE.PointLight(0x00e5ff,3,80);
  light.position.set(
    Math.random()*200-100,
    10,
    Math.random()*200-100
  );
  scene.add(light);
}

/* ========= TEXTURES ========= */

const loader = new THREE.TextureLoader();

const groundTex = loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg");
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
groundTex.repeat.set(40,40);

/* ========= GROUND ========= */

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({
    map: groundTex,
    roughness: 0.9,
    metalness: 0.2
  })
);

ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

/* ========= BUILDINGS ========= */

function createBuilding(x,z){

  const height = 10 + Math.random()*60;

  const mat = new THREE.MeshStandardMaterial({
    color: 0x1e2533,
    roughness: 0.6,
    metalness: 0.5
  });

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(6,height,6),
    mat
  );

  mesh.position.set(x,height/2,z);
  mesh.castShadow = true;
  scene.add(mesh);

  // windows
  for(let y=5;y<height;y+=6){
    const win = new THREE.Mesh(
      new THREE.BoxGeometry(5.5,1,0.2),
      new THREE.MeshBasicMaterial({
        color:Math.random()>0.5?0x00e5ff:0xffcc00
      })
    );
    win.position.set(x,y,z+3);
    scene.add(win);
  }

  // glow top
  const glow = new THREE.Mesh(
    new THREE.BoxGeometry(5.5,0.3,5.5),
    new THREE.MeshBasicMaterial({color:0x00e5ff})
  );
  glow.position.set(x,height,z);
  scene.add(glow);
}

/* city density */
for(let i=0;i<120;i++){
  createBuilding(
    Math.random()*300-150,
    Math.random()*300-150
  );
}

/* ========= PLAYER ========= */

const player = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5,1,8,16),
  new THREE.MeshStandardMaterial({
    color:0x00e5ff,
    emissive:0x00e5ff,
    emissiveIntensity:0.4,
    metalness:0.5,
    roughness:0.3
  })
);

player.castShadow = true;
scene.add(player);

/* ========= MOVEMENT ========= */

let x=0,z=0;

window.addEventListener("touchmove",e=>{
  let t=e.touches[0];
  x+=(t.clientX-innerWidth/2)/350;
  z+=(t.clientY-innerHeight/2)/350;
});

/* ========= LOOP ========= */

function loop(){
  requestAnimationFrame(loop);

  player.position.set(x,1,z);

  // smooth camera follow
  camera.position.lerp(
    new THREE.Vector3(x,6,z+14),
    0.08
  );

  camera.lookAt(player.position);

  renderer.render(scene,camera);
}

loop();

/* ========= RESIZE ========= */

window.onresize=()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
};
</script>
</body>
</html>
