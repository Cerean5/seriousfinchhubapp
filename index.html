<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Finch × Sons of Gunsmoke</title>
<link rel="manifest" href="manifest.json"><style>
body{
margin:0;
font-family:Inter,Arial;
background:#000;
color:#fff;
}

/* HERO */
.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:brightness(.6);
transition:opacity 1.2s ease;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.95), rgba(0,0,0,.3));
}

.hero-content{
position:relative;
z-index:2;
animation:fadeIn 1.2s ease;
}

.hero h1{
font-size:4.5rem;
letter-spacing:6px;
margin:0;
font-weight:900;
}

.hero p{
color:#aaa;
margin-top:12px;
font-size:18px;
letter-spacing:2px;
}

.btn{
padding:18px 40px;
margin:10px;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:700;
font-size:18px;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

.primary{
background:#ff2d55;
color:#fff;
box-shadow:0 0 30px rgba(255,45,85,.7);
}

.secondary{
background:transparent;
color:#fff;
border:1px solid rgba(255,255,255,.4);
}

.section{
padding:100px 20px;
text-align:center;
max-width:1100px;
margin:auto;
}

h2{
font-size:2rem;
letter-spacing:3px;
margin-bottom:10px;
}

p{
color:#aaa;
line-height:1.6;
}

iframe{
width:100%;
max-width:750px;
height:420px;
border:none;
margin-top:30px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:30px;
}

.grid img{
width:100%;
border-radius:16px;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.7);
}

.grid img:hover{
transform:scale(1.05);
}

.grid img:first-child{
grid-column:span 2;
}

footer{
padding:40px 20px;
text-align:center;
color:#666;
border-top:1px solid #111;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

</style></head><body><!-- HERO --><div class="hero">
<div id="s1" class="slide" style="background-image:url('image-hero-1.jpg');opacity:1"></div>
<div id="s2" class="slide" style="background-image:url('image-hero-2.jpg');opacity:0"></div>
<div id="s3" class="slide" style="background-image:url('image-hero-3.jpg');opacity:0"></div>
<div class="overlay"></div><div class="hero-content">
<h1>WHY SO SERIOUS</h1>
<p>Serious Finch × Sons of Gunsmoke</p><button class="btn primary" onclick="go('spotify')">STREAM NOW</button> <button class="btn secondary" onclick="go('youtube')">WATCH VIDEO</button>

</div>
</div><!-- VIDEO --><div class="section">
<h2>OFFICIAL VIDEO</h2>
<iframe src="https://www.youtube.com/embed/L6qnsBgi2ZQ?autoplay=1&mute=1"></iframe>
</div><!-- STREAM --><div class="section">
<h2>LISTEN</h2>
<iframe src="https://open.spotify.com/embed/track/7zEJAr3odmPEhBiywgqafV"></iframe>
</div><!-- GROUP --><div class="section">
<h2>SONS OF GUNSMOKE</h2>
<p>
A collective built on presence, pressure, and sound. Serious Finch leads — the movement expands.
</p>
</div><!-- VISUALS --><div class="section">
<h2>VISUALS</h2>
<div class="grid">
<img src="image-hero-1.jpg">
<img src="image-hero-2.jpg">
<img src="image-hero-3.jpg">
</div>
</div><footer>
© Serious Finch × Sons of Gunsmoke
</footer><script>
const LINKS={
spotify:"https://open.spotify.com/track/7zEJAr3odmPEhBiywgqafV",
youtube:"https://youtube.com/watch?v=L6qnsBgi2ZQ"
};

function go(p){window.open(LINKS[p],"_blank");}

let slides=["s1","s2","s3"];
let i=0;
setInterval(()=>{
document.getElementById(slides[i]).style.opacity=0;
i=(i+1)%3;
document.getElementById(slides[i]).style.opacity=1;
},5000);
</script></body>
</html>
